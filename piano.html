<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics-Based Piano Synthesis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000410;
  color: #e0e0e0;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  user-select: none;
}
h1 {
  font-size: 1.5rem;
  color: #00ffff;
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.controls {
  display: flex;
  gap: 20px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.mode-tabs, .clef-toggle, .inst-toggle {
  display: flex;
  gap: 4px;
}
.tab, .clef-btn, .inst-btn {
  background: #111;
  color: #888;
  border: 1px solid #333;
  padding: 6px 16px;
  cursor: pointer;
  font-size: 0.9rem;
  border-radius: 4px;
  transition: all 0.15s;
}
.tab:hover, .clef-btn:hover, .inst-btn:hover { color: #ccc; border-color: #555; }
.tab.active, .clef-btn.active, .inst-btn.active {
  background: #00ffff22;
  color: #00ffff;
  border-color: #00ffff;
}
.stats-bar {
  display: flex;
  gap: 24px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.stats-bar .stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 60px;
}
.stats-bar .stat .label {
  font-size: 0.7rem;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stats-bar .stat .value {
  font-size: 1.2rem;
  font-weight: bold;
  color: #e0e0e0;
}
.main-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
#staff-canvas {
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  cursor: default;
}
#staff-canvas.clickable { cursor: crosshair; }
.note-buttons {
  display: flex;
  gap: 8px;
}
.note-btn {
  width: 48px;
  height: 48px;
  background: #111;
  color: #e0e0e0;
  border: 2px solid #333;
  border-radius: 8px;
  font-size: 1.3rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.12s;
}
.note-btn:hover { border-color: #00ffff; color: #00ffff; transform: scale(1.05); }
.note-btn.correct { background: #00ff0033; border-color: #00ff00; color: #00ff00; }
.note-btn.incorrect { background: #ff444433; border-color: #ff4444; color: #ff4444; }
#replay-btn {
  background: #111;
  border: 1px solid #333;
  color: #e0e0e0;
  padding: 8px 20px;
  font-size: 1.1rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
#replay-btn:hover { border-color: #00ffff; color: #00ffff; }
#result {
  font-size: 1.1rem;
  min-height: 1.5em;
  text-align: center;
}
#result.correct { color: #00ff00; }
#result.incorrect { color: #ff4444; }
#intro-box {
  background: #0a0a1a;
  border: 1px solid #00ffff44;
  border-radius: 8px;
  padding: 16px 24px;
  text-align: center;
  max-width: 400px;
}
#intro-box .note-name {
  font-size: 2rem;
  color: #00ffff;
  font-weight: bold;
}
#intro-box .hint {
  color: #aaa;
  font-style: italic;
  margin-top: 8px;
  font-size: 0.9rem;
}
#piano-container {
  margin-bottom: 16px;
  overflow-x: auto;
  max-width: 100%;
}
body.mirror #staff-canvas,
body.mirror #key-guide-canvas,
body.mirror #piano-canvas,
body.mirror #press-dot-canvas { transform: scaleX(-1); }

#learn-loop {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  border-radius: 0 !important;
  border-left: none !important;
  border-right: none !important;
  border-bottom: none !important;
  justify-content: center;
}

#key-guide-canvas {
  display: none;
  background: #07070f;
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  margin-bottom: 4px;
}
#piano-canvas {
  border-radius: 4px;
  cursor: default;
}
#piano-canvas.clickable { cursor: pointer; }
#press-dot-canvas {
  display: none;
  background: #07070f;
  border: 1px solid #1a1a2e;
  border-radius: 4px 4px 0 0;
  margin-top: 4px;
}
#press-dot-resize {
  display: none;
  width: 100%;
  height: 6px;
  background: #1a1a2e;
  border: 1px solid #1a1a2e;
  border-top: none;
  border-radius: 0 0 4px 4px;
  cursor: ns-resize;
  margin-bottom: 4px;
}
#press-curve-canvas {
  display: none;
  background: #07070f;
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  margin-top: 3px;
}
.hint-toggle {
  margin-bottom: 12px;
}
.hint-toggle label {
  color: #666;
  font-size: 0.85rem;
  cursor: pointer;
}
.hint-toggle input { margin-right: 6px; }
#mnemonic-hint {
  color: #888;
  font-size: 0.85rem;
  font-style: italic;
  min-height: 1.2em;
  text-align: center;
  margin-bottom: 8px;
}
.charts {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.charts canvas {
  border: 1px solid #1a1a2e;
  border-radius: 4px;
}
#note-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  max-width: 700px;
  margin-bottom: 16px;
}
.note-tile {
  width: 52px;
  height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #111;
  border: 1px solid #333;
  border-radius: 4px;
  font-size: 0.8rem;
  position: relative;
}
.note-tile .tile-name { font-weight: bold; color: #e0e0e0; }
.note-tile .tile-acc { font-size: 0.65rem; color: #888; }
.note-tile.unseen { opacity: 0.35; }
.note-tile.mastered { border-color: #00ff0066; }
.note-tile.struggling { border-color: #ff444466; }
.note-tile.locked { opacity: 0.15; }
.note-tile.wide { width: auto; min-width: 52px; max-width: 120px; padding: 4px 8px; }
#module-area {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  width: 100%;
  max-width: 700px;
}
#module-area.active { display: flex; }
.module-answers {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 620px;
}
.module-btn {
  background: #111;
  color: #e0e0e0;
  border: 2px solid #333;
  border-radius: 8px;
  padding: 10px 18px;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.12s;
  min-width: 60px;
  text-align: center;
}
.module-btn:hover { border-color: #00ffff; color: #00ffff; transform: scale(1.03); }
.module-btn.correct { background: #00ff0033; border-color: #00ff00; color: #00ff00; }
.module-btn.incorrect { background: #ff444433; border-color: #ff4444; color: #ff4444; }
.module-btn.wide { min-width: 160px; }
#module-replay-btn {
  background: #111;
  border: 1px solid #333;
  color: #e0e0e0;
  padding: 8px 20px;
  font-size: 1.1rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
#module-replay-btn:hover { border-color: #00ffff; color: #00ffff; }
#module-next-btn {
  background: #00ffff15;
  border: 1px solid #00ffff66;
  color: #00ffff;
  padding: 8px 28px;
  font-size: 1rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}
#module-next-btn:hover { background: #00ffff25; border-color: #00ffff; }
.module-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
}
.module-toggle label {
  color: #888;
  font-size: 0.85rem;
  cursor: pointer;
}
.module-toggle input { margin-right: 4px; }
.rhythm-tap-area {
  width: 300px;
  height: 80px;
  background: #0a0a1a;
  border: 2px solid #333;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: #888;
  cursor: pointer;
  transition: all 0.1s;
  user-select: none;
}
.rhythm-tap-area:active, .rhythm-tap-area.tapped {
  background: #00ffff11;
  border-color: #00ffff;
  color: #00ffff;
}
.dictation-staff {
  position: relative;
  cursor: crosshair;
}
.bottom-controls {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}
.bottom-controls button {
  background: #111;
  border: 1px solid #333;
  color: #888;
  padding: 6px 14px;
  font-size: 0.8rem;
  border-radius: 4px;
  cursor: pointer;
}
.bottom-controls button:hover { color: #ccc; border-color: #555; }
#module-legend {
  display: none;
  max-width: 700px;
  width: 100%;
  margin-bottom: 20px;
  border: 1px solid #1a1a2e;
  border-radius: 8px;
  background: #060612;
  overflow: hidden;
}
#module-legend.active { display: block; }
#module-legend summary {
  padding: 10px 16px;
  cursor: pointer;
  color: #888;
  font-size: 0.85rem;
  user-select: none;
}
#module-legend summary:hover { color: #aaa; }
#module-legend .legend-body {
  padding: 4px 16px 16px;
  color: #aaa;
  font-size: 0.82rem;
  line-height: 1.6;
}
#module-legend table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
}
#module-legend th {
  text-align: left;
  color: #666;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 8px;
  border-bottom: 1px solid #1a1a2e;
}
#module-legend td {
  padding: 3px 8px;
  border-bottom: 1px solid #0d0d1a;
  vertical-align: top;
}
#module-legend td:first-child {
  color: #00cccc;
  white-space: nowrap;
  font-weight: bold;
}
#module-legend .legend-tip {
  color: #666;
  font-style: italic;
  margin-top: 8px;
}
</style>
</head>
<body>

<canvas id="vel-bar-fixed" width="28" height="1" style="position:fixed;left:0;top:0;height:100vh;width:28px;z-index:9999;pointer-events:none;"></canvas>

<h1>Learn Piano</h1>

<div class="controls">
  <div class="mode-tabs">
    <button class="tab" data-mode="play">Play</button>
    <button class="tab active" data-mode="read">Read</button>
    <button class="tab" data-mode="listen">Listen</button>
    <button class="tab" data-mode="find">Find</button>
  </div>
  <div class="clef-toggle" style="display:none">
    <button class="clef-btn active" data-clef="treble">Treble</button>
    <button class="clef-btn" data-clef="bass">Bass</button>
  </div>
  <div class="inst-toggle">
    <button class="inst-btn active" data-inst="grand_piano">Grand Piano</button>
    <button class="inst-btn" data-inst="salamander">Salamander (ref)</button>
    <button class="inst-btn" data-inst="rhodes_fm">Rhodes FM</button>
    <button class="inst-btn" data-inst="rhodes">Rhodes (ref)</button>
    <button class="inst-btn" data-inst="prism">Prism</button>
    <button class="inst-btn" data-inst="ddsp_piano">DDSP Piano</button>
  </div>
  <div id="theremin-controls" style="display:none;margin-top:6px;flex-wrap:wrap;align-items:center;gap:10px;font-size:12px;color:#88cc88;padding:4px 0;">
    <span style="font-weight:bold;letter-spacing:0.5px;">Theremin</span>
    <label>Scale:
      <select id="theremin-scale" style="background:#0a1a0a;color:#88cc88;border:1px solid #335533;border-radius:3px;padding:2px 5px;font-size:11px;margin-left:3px;">
        <option value="chromatic">Chromatic</option>
        <option value="pent_maj">Pentatonic Major</option>
        <option value="pent_min">Pentatonic Minor</option>
        <option value="diat_maj">Diatonic Major</option>
        <option value="diat_min">Diatonic Minor</option>
        <option value="whole_tone">Whole Tone</option>
      </select>
    </label>
    <label>Root:
      <select id="theremin-root" style="background:#0a1a0a;color:#88cc88;border:1px solid #335533;border-radius:3px;padding:2px 5px;font-size:11px;margin-left:3px;">
        <option value="0">C</option><option value="1">C#</option><option value="2">D</option>
        <option value="3">D#</option><option value="4">E</option><option value="5">F</option>
        <option value="6">F#</option><option value="7">G</option><option value="8">G#</option>
        <option value="9">A</option><option value="10">A#</option><option value="11">B</option>
      </select>
    </label>
    <label>Timbre:
      <select id="theremin-timbre" style="background:#0a1a0a;color:#88cc88;border:1px solid #335533;border-radius:3px;padding:2px 5px;font-size:11px;margin-left:3px;">
        <option value="sine">Sine (classic)</option>
        <option value="warm">Warm (+ octave)</option>
        <option value="hollow">Hollow (triangle)</option>
        <option value="rhodes">Rhodes (looped sample)</option>

      </select>
    </label>
    <label style="cursor:pointer;"><input type="checkbox" id="theremin-binaural"> Binaural</label>
    <span id="theremin-display" style="font-size:11px;color:#44aa66;min-width:80px;"></span>
  </div>
  <div class="midi-player" style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <select id="midi-select" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 6px;font-size:12px;">
      <option value="">MIDI Songs</option>
      <optgroup label="Warm-ups: Basics">
        <option value="midi/songs/warmup-five-finger.mid">Five-Finger (4-note groups, 3 oct)</option>
        <option value="midi/songs/warmup-c-major-scale.mid">C Major Scale (2 oct)</option>
        <option value="midi/songs/warmup-chromatic-scale.mid">Chromatic Scale (2 oct)</option>
        <option value="midi/songs/warmup-contrary-motion.mid">Contrary Motion Scale</option>
      </optgroup>
      <optgroup label="Warm-ups: Hanon">
        <option value="midi/songs/warmup-hanon-no1.mid">Hanon No.1 (1-3-4-5-6-5-4-3)</option>
        <option value="midi/songs/warmup-hanon-no2.mid">Hanon No.2 (1-3-2-4-3-5-4-6)</option>
        <option value="midi/songs/warmup-hanon-no5.mid">Hanon No.5 (1-4-3-5-4-6-5-7)</option>
      </optgroup>
      <optgroup label="Warm-ups: Technique">
        <option value="midi/songs/warmup-arpeggios.mid">Arpeggios (C, G, F, Am, Dm)</option>
        <option value="midi/songs/warmup-scales-in-thirds.mid">Scales in Thirds</option>
        <option value="midi/songs/warmup-alberti-bass.mid">Alberti Bass</option>
        <option value="midi/songs/warmup-trills.mid">Trills (finger pairs)</option>
      </optgroup>
    </select>
    <input type="file" id="midi-file" accept=".mid,.midi" style="display:none;">
    <button onclick="document.getElementById('midi-file').click()" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">Load .mid</button>
    <button id="midi-play" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;" disabled>Play</button>
    <button id="midi-stop" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;" disabled>Stop</button>
    <button id="midi-follow" style="background:#1a1a2e;color:#ffaa00;border:1px solid #554400;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;" disabled>Follow</button>
    <button id="mute-btn" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">🔇 Mute</button>
    <span id="follow-status" style="font-size:11px;color:#ffaa00;min-width:120px;"></span>
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#999;cursor:pointer;user-select:none;">
      <input type="checkbox" id="velocity-toggle" checked style="accent-color:#00aaaa;">
      Velocity
    </label>
    <canvas id="vel-bar" width="80" height="18" style="border-radius:3px;background:#111;"></canvas>
    <span id="midi-status" style="font-size:11px;color:#666;"></span>
    <span id="midi-in-status" style="font-size:11px;color:#666;margin-left:8px;"></span>
    <button id="midi-rescan-btn" style="background:#1a1a2e;color:#888;border:1px solid #333;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;display:none;" title="Rescan MIDI devices">↺</button>
    <button id="ble-midi-btn" style="background:#1a1a2e;color:#888;border:1px solid #333;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;" title="Connect BLE MIDI directly (bypasses OS MIDI stack)">🔵 BLE</button>
  </div>
  <div id="midi-timeline-wrap" style="display:none;margin-top:4px;align-items:center;gap:8px;padding:0 2px;">
    <span id="midi-time-current" style="font-size:10px;color:#777;min-width:36px;text-align:right;">0:00</span>
    <input type="range" id="midi-timeline" min="0" max="1000" value="0" style="flex:1;height:6px;accent-color:#00aaaa;cursor:pointer;">
    <span id="midi-time-total" style="font-size:10px;color:#777;min-width:36px;">0:00</span>
  </div>
  <div id="learn-loop" style="display:none;margin-top:4px;padding:4px 8px;background:#0a0a1a;border:1px solid #333;border-radius:4px;align-items:center;gap:8px;flex-wrap:wrap;">
    <span style="font-size:11px;color:#ffaa00;">Learn:</span>
    <button id="loop-set-a" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">Set A</button>
    <span id="loop-a-label" style="font-size:11px;color:#00aaaa;min-width:32px;">A: –</span>
    <button id="loop-set-b" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">Set B</button>
    <span id="loop-b-label" style="font-size:11px;color:#00aaaa;min-width:32px;">B: –</span>
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#999;cursor:pointer;user-select:none;">
      <input type="checkbox" id="loop-enable" style="accent-color:#ffaa00;">
      Loop A→B
    </label>
    <button id="loop-clear" style="background:#1a1a2e;color:#666;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">Clear</button>
  </div>
  <div id="follow-log-wrap" style="display:none;margin-top:4px;">
    <button id="follow-log-toggle" style="background:none;border:none;color:#666;font-size:11px;cursor:pointer;padding:2px 4px;">▸ Follow Log</button>
    <button id="follow-log-export" style="background:none;border:none;color:#555;font-size:10px;cursor:pointer;padding:2px 4px;" title="Export log to file">⬇ Export</button>
    <button id="follow-log-import" style="background:none;border:none;color:#555;font-size:10px;cursor:pointer;padding:2px 4px;" title="Import log from file">⬆ Import</button>
    <input type="file" id="follow-log-file" accept=".json" style="display:none;">
    <div id="follow-log" style="display:none;margin-top:2px;max-height:200px;overflow-y:auto;background:#0a0a14;border:1px solid #222;border-radius:4px;font-size:11px;color:#999;"></div>
  </div>
  <div id="vel-compare" style="display:none;margin-top:6px;padding:8px 10px;background:#0d0d1a;border:1px solid #333;border-radius:6px;">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
      <span style="font-size:11px;color:#999;">Velocity Compare:</span>
      <select id="vel-compare-note" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:2px 6px;font-size:12px;"></select>
      <button id="vel-sweep-btn" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">Sweep pp→fff</button>
      <button id="vel-sweep-down-btn" style="background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;">Sweep fff→pp</button>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#999;cursor:pointer;user-select:none;">
        <input type="checkbox" id="vel-normalize" style="accent-color:#00aaaa;">
        Equal volume
      </label>
    </div>
    <div id="vel-layer-btns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="label">Trials</span><span class="value" id="stat-trials">0</span></div>

/* ═══════════════════════════════════════════════════════
   AUDIO ENGINE — Multi-instrument sampler

   Rhodes: jRhodes3d (1977 Rhodes Mark I Stage 73)

let audioCtx = null;
let masterGain = null;
let compressor = null;
let reverbConvolver = null;
let reverbSend = null;
let reverbWet = null;
let reverbAmount = 0.25;
const activeVoices = {};  // midi -> {source, gain} for re-trigger cutoff
const recentStrikes = [];  // last 5 strike trajectories for the line chart
let velocityEnabled = true;
let velNormalize = false;
let pressureExprEnabled = false;

/* ═══════════════════════════════════════════════════════
   THEREMIN — continuous HE-travel → oscillator synthesis
   Each key has its own sine voice; travel depth = volume.
   No strike threshold: sound begins from NOISE_FLOOR.
   Vibrato builds in past 55% travel depth (≈ 2.2mm).
   ═══════════════════════════════════════════════════════ */
const thereminVoices = {};   // rawMidi → { osc1, osc2, osc2gain, lfo, lfoGain, gainNode, qmidi }
const thereminFiredKeys = new Set();  // matrix key strings that have fired MidiFollow.onNoteOn this press

const THEREMIN_SCALES = {
  chromatic:  null,
  pent_maj:   [0, 2, 4, 7, 9],
  pent_min:   [0, 3, 5, 7, 10],
  diat_maj:   [0, 2, 4, 5, 7, 9, 11],
  diat_min:   [0, 2, 3, 5, 7, 8, 10],
  whole_tone: [0, 2, 4, 6, 8, 10],
};

function thereminQuantize(midi) {
  const scale = document.getElementById('theremin-scale')?.value || 'chromatic';
  const root = parseInt(document.getElementById('theremin-root')?.value ?? '0');
  const intervals = THEREMIN_SCALES[scale];
  if (!intervals) return midi;
  const relative = ((midi - root) % 12 + 12) % 12;
  let nearestDeg = intervals[0], minDist = 13;
  for (const deg of intervals) {
    const d = Math.min(Math.abs(relative - deg), 12 - Math.abs(relative - deg));
    if (d < minDist) { minDist = d; nearestDeg = deg; }
  }
  return root + Math.floor((midi - root) / 12) * 12 + nearestDeg;
}

function thereminStart(rawMidi) {
  if (thereminVoices[rawMidi]) return;
  const ctx = getAudioCtx();
  const qmidi = thereminQuantize(rawMidi);
  const timbre = document.getElementById('theremin-timbre')?.value || 'sine';

  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0.0001, ctx.currentTime);
  const binaural = document.getElementById('theremin-binaural')?.checked;
  if (binaural) {
    const panner = ctx.createStereoPanner();
    panner.pan.value = Object.keys(thereminVoices).length % 2 === 0 ? -1 : 1;
    gainNode.connect(panner);
    panner.connect(compressor);
    gainNode._panner = panner;
  } else {
    gainNode.connect(compressor);
  }

  // Shared LFO — connects to pitch target (osc.detune or source.detune)
  const lfo = ctx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 5.2;
  const lfoGain = ctx.createGain();
  lfoGain.gain.setValueAtTime(0, ctx.currentTime);
  lfo.connect(lfoGain);

  // ── Rhodes: looped rhodes_fm sample ──────────────────────────────────────
  if (timbre === 'rhodes') {
    const inst = INSTRUMENTS['rhodes_fm'];
    if (inst?.loaded) {
      const closest = findClosestSample(qmidi, inst.samples);
      // Prefer mid-velocity layer (4/8) for neutral warmth; fall back to default buffer
      const buf = inst.velBuffers?.[4]?.[closest.midi] || inst.buffers[closest.midi];
      if (buf) {
        const source = ctx.createBufferSource();
        source.buffer = buf;
        source.detune.value = (qmidi - closest.midi) * 100;
        source.loop = true;
        source.loopStart = 0.30;   // skip the initial hammer transient
        source.loopEnd = Math.min(buf.duration, 3.0);
        lfoGain.connect(source.detune);  // vibrato on pitch
        source.connect(gainNode);
        source.start();
        lfo.start();
        thereminVoices[rawMidi] = { source, lfo, lfoGain, gainNode, qmidi, baseMidi: closest.midi };
        return;
      }
    }
    // Fall through to sine if samples not yet loaded
  }

  // ── Oscillator timbres (sine / warm / hollow) ─────────────────────────────
  const freq = 440 * Math.pow(2, (qmidi - 69) / 12);

  const osc1 = ctx.createOscillator();
  osc1.type = timbre === 'hollow' ? 'triangle' : 'sine';
  osc1.frequency.value = freq;

  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq;
  // 'warm': add an octave overtone | 'sine'/'hollow': subtle detuning for warmth
  osc2.detune.value = timbre === 'warm' ? 1200 : 7;

  const osc2gain = ctx.createGain();
  osc2gain.gain.value = timbre === 'warm' ? 0.28 : 0.48;

  lfoGain.connect(osc1.detune);
  if (timbre !== 'warm') lfoGain.connect(osc2.detune);

  osc1.connect(gainNode);
  osc2.connect(osc2gain);
  osc2gain.connect(gainNode);

  osc1.start(); osc2.start(); lfo.start();
  thereminVoices[rawMidi] = { osc1, osc2, osc2gain, lfo, lfoGain, gainNode, qmidi };
}

function thereminUpdate(rawMidi, travelRaw) {
  if (!thereminVoices[rawMidi]) thereminStart(rawMidi);
  const voice = thereminVoices[rawMidi];
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const nf = HEKeyboard.NOISE_FLOOR;
  // Normalise travel to 0-1 starting from noise floor
  const t01 = Math.max(0, Math.min(1, (travelRaw - nf) / (240 - nf)));
  // Power curve: light touch → near-silence, full press → 0.55 gain
  voice.gainNode.gain.setTargetAtTime(Math.pow(t01, 1.5) * 0.55, now, 0.018);
  // Vibrato grows from 55% depth onward, max ±28 cents at full press
  voice.lfoGain.gain.setTargetAtTime(Math.max(0, (t01 - 0.55) / 0.45) * 28, now, 0.08);
  // Re-quantize on scale change
  const qmidi = thereminQuantize(rawMidi);
  if (qmidi !== voice.qmidi) {
    if (voice.source) {
      // Rhodes: adjust detune relative to the loaded sample's base pitch
      voice.source.detune.setTargetAtTime((qmidi - voice.baseMidi) * 100, now, 0.02);
    } else {
      const f = 440 * Math.pow(2, (qmidi - 69) / 12);
      voice.osc1.frequency.setTargetAtTime(f, now, 0.02);
      voice.osc2.frequency.setTargetAtTime(f, now, 0.02);
    }
    voice.qmidi = qmidi;
  }
}

function thereminStop(rawMidi) {
  const voice = thereminVoices[rawMidi];
  if (!voice) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  voice.gainNode.gain.cancelScheduledValues(now);
  voice.gainNode.gain.setValueAtTime(Math.max(0.0001, voice.gainNode.gain.value), now);
  voice.gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
  const v = voice;
  setTimeout(() => {
    if (v.source) {
      try { v.source.stop(); } catch (e) {}
    } else {
      try { v.osc1.stop(); v.osc2.stop(); } catch (e) {}
    }
    try { v.lfo.stop(); } catch (e) {}
    try { v.gainNode.disconnect(); } catch (e) {}
    try { if (v.gainNode._panner) v.gainNode._panner.disconnect(); } catch (e) {}
  }, 120);
  delete thereminVoices[rawMidi];
}

function thereminStopAll() {
  for (const midi of Object.keys(thereminVoices)) thereminStop(Number(midi));
  thereminFiredKeys.clear();
}

function drawThereminDisplay() {
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const active = Object.entries(thereminVoices)
    .map(([m, v]) => NOTE_NAMES[v.qmidi % 12] + Math.floor(v.qmidi / 12 - 1))
    .join(' + ');
  const el = document.getElementById('theremin-display');
  if (el) el.textContent = active || '';
}

function drawVelBar(velocity) {
  const c = document.getElementById('vel-bar');
  if (!c) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.clearRect(0, 0, w, h);
  const vel01 = Math.max(0, Math.min(1, velocity / 127));
  const barW = vel01 * w;
  // Gradient from blue (pp) through green to red (fff)
  const r = Math.round(255 * Math.min(1, vel01 * 2));
  const g = Math.round(255 * Math.min(1, 2 - vel01 * 2));
  ctx.fillStyle = `rgb(${r},${g},80)`;
  ctx.fillRect(0, 0, barW, h);
  // Layer number label
  const nLayers = INSTRUMENTS[state.instrument]?.velocityLayers || 0;
  if (nLayers > 0 && velocityEnabled) {
    const layer = Math.max(1, Math.min(nLayers, Math.ceil(vel01 * nLayers)));
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('v' + layer, w - 3, 13);
  }
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(velocity, 3, 13);

  // Fixed vertical bar on left edge
  const fc = document.getElementById('vel-bar-fixed');
  if (!fc) return;
  const dpr = window.devicePixelRatio || 1;
  const fh = fc.clientHeight, fw = fc.clientWidth;
  if (fc.width !== fw * dpr || fc.height !== fh * dpr) {
    fc.width = fw * dpr; fc.height = fh * dpr;
  }
  const fctx = fc.getContext('2d');
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, fw, fh);
  const barH = vel01 * fh;
  fctx.fillStyle = `rgb(${r},${g},80)`;
  fctx.fillRect(0, fh - barH, fw, barH);
  // Velocity number at top of the bar
  fctx.save();
  fctx.fillStyle = '#fff';
  fctx.font = 'bold 11px monospace';
  fctx.textAlign = 'center';
  fctx.fillText(velocity, fw / 2, fh - barH - 4);
  fctx.restore();
}

function buildReverbIR(ctx) {
  // Synthesize a grand piano room IR:
  // - Pre-delay ~20ms (mic inside open piano lid)
  // - 6 early reflections (room walls/lid bounces) in first 80ms
  // - Diffuse exponential tail, ~1.0s RT60
  // - HF absorption: tail rolls off faster above 2kHz
  const sampleRate = ctx.sampleRate;
  const duration = 2.0;
  const nSamples = Math.ceil(sampleRate * duration);
  const ir = ctx.createBuffer(2, nSamples, sampleRate);

  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    const rt60 = 1.0;
    const decay = Math.log(0.001) / (rt60 * sampleRate);  // -60dB in rt60 seconds

    // Diffuse tail: exponentially decaying noise
    for (let i = 0; i < nSamples; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(decay * i);
    }

    // Pre-delay: silence the first 20ms
    const preDelay = Math.round(0.020 * sampleRate);
    for (let i = 0; i < preDelay; i++) data[i] = 0;

    // Early reflections: sparse echoes with decaying amplitude
    const reflections = [
      { delay: 0.022, amp: 0.7 }, { delay: 0.035, amp: 0.5 },
      { delay: 0.048, amp: 0.4 }, { delay: 0.061, amp: 0.3 },
      { delay: 0.074, amp: 0.2 }, { delay: 0.088, amp: 0.15 },
    ];
    for (const { delay, amp } of reflections) {
      const idx = Math.round(delay * sampleRate);
      if (idx < nSamples) data[idx] += (ch === 0 ? 1 : -1) * amp * (Math.random() * 0.4 + 0.8);
    }

    // Gentle HF damping via simple one-pole lowpass on the tail (above preDelay)
    const hfDamp = 0.25;  // 0=no damping, 1=full (lower = more HF absorbed)
    let z = 0;
    for (let i = preDelay; i < nSamples; i++) {
      z = z * (1 - hfDamp) + data[i] * hfDamp;
      data[i] = data[i] * 0.5 + z * 0.5;
    }
  }

  // Normalize IR peak to 1
  let peak = 0;
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < nSamples; i++) peak = Math.max(peak, Math.abs(data[i]));
  }
  if (peak > 0) {
    for (let ch = 0; ch < 2; ch++) {
      const data = ir.getChannelData(ch);
      for (let i = 0; i < nSamples; i++) data[i] /= peak;
    }
  }

  return ir;
}

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Master bus: compressor → gain → destination
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -12;
    compressor.knee.value = 6;
    compressor.ratio.value = 8;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.15;
    masterGain = audioCtx.createGain();
    masterGain.gain.value = state.muted ? 0 : 0.8;
    compressor.connect(masterGain);
    masterGain.connect(audioCtx.destination);

    // Reverb bus: compressor → reverbSend → convolver → reverbWet → masterGain
    reverbConvolver = audioCtx.createConvolver();
    reverbConvolver.buffer = buildReverbIR(audioCtx);
    reverbSend = audioCtx.createGain();
    reverbSend.gain.value = reverbAmount;
    reverbWet = audioCtx.createGain();
    reverbWet.gain.value = 1.0;
    compressor.connect(reverbSend);
    reverbSend.connect(reverbConvolver);
    reverbConvolver.connect(reverbWet);
    reverbWet.connect(masterGain);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
