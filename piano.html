let samplesLoading = false;
let samplesReady = false;

async function loadBatch(tasks, concurrency = 8) {
  let i = 0;
  const run = async () => {
    while (i < tasks.length) {
      const idx = i++;
      await tasks[idx]();
    }
  };
  await Promise.all(Array.from({ length: Math.min(concurrency, tasks.length) }, run));
}

async function loadInstrument(name) {
  const inst = INSTRUMENTS[name];
  if (inst.loaded) return;
  const ctx = getAudioCtx();
  const nLayers = inst.velocityLayers || 0;
  const cacheBreak = Date.now();

  const tasks = [];

  if (nLayers > 0) {
    inst.velBuffers = {};
    for (let layer = 1; layer <= nLayers; layer++) {
      inst.velBuffers[layer] = {};
      for (const s of inst.samples) {
        const l = layer, sm = s;
        tasks.push(async () => {
          try {
            const resp = await fetch(inst.dir + 'v' + l + '/' + sm.file + '.mp3?v=' + cacheBreak);
            inst.velBuffers[l][sm.midi] = await ctx.decodeAudioData(await resp.arrayBuffer());
          } catch (e) {
            console.warn('Failed to load', name, 'v' + l, sm.file, e);
          }
        });
      }
    }
    // Also load default (top layer) into buffers for non-velocity playback
    for (const s of inst.samples) {
      const sm = s;
      tasks.push(async () => {
        try {
          const resp = await fetch(inst.dir + sm.file + '.mp3?v=' + cacheBreak);
          inst.buffers[sm.midi] = await ctx.decodeAudioData(await resp.arrayBuffer());
        } catch (e) {
          console.warn('Failed to load', name, sm.file, e);
        }
      });
    }
  } else {
    for (const s of inst.samples) {
      const sm = s;
      tasks.push(async () => {
        try {
          const resp = await fetch(inst.dir + sm.file + '.mp3?v=' + cacheBreak);
          inst.buffers[sm.midi] = await ctx.decodeAudioData(await resp.arrayBuffer());
        } catch (e) {
          console.warn('Failed to load', name, sm.file, e);
        }
      });
    }
  }

  await loadBatch(tasks, 12);
  inst.loaded = true;
  console.log(`[LOAD] ${name} fully loaded, ${Object.keys(inst.buffers).length} samples` +
    (nLayers > 0 ? `, ${nLayers} velocity layers` : ''));
}

async function loadSamples() {
  if (samplesLoading) return;
  samplesLoading = true;
  await Promise.all([loadInstrument('grand_piano'), loadInstrument('salamander'), loadInstrument('rhodes'), loadInstrument('rhodes_fm'), loadInstrument('prism'), loadInstrument('ddsp_piano')]);
  samplesLoading = false;
  samplesReady = true;
}

function findClosestSample(midi, samples) {
  let best = samples[0];
  let bestDist = Math.abs(midi - best.midi);
  for (const s of samples) {
    const dist = Math.abs(midi - s.midi);
    if (dist < bestDist) { best = s; bestDist = dist; }
  }
  return best;
}

function playMidiNote(midi, duration = 2.5, velocity = 100) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  // ── Theremin: synthesise with shaped envelope, no samples ──
  if (state.instrument === 'theremin') {
    drawVelBar(velocity);
    const prev = activeVoices[midi];
    if (prev) {
      prev.gain.gain.cancelScheduledValues(now);
      prev.gain.gain.setValueAtTime(Math.max(0.0001, prev.gain.gain.value), now);
      prev.gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
      try { prev.source.stop(now + 0.08); } catch (e) {}
      delete activeVoices[midi];
    }

    const qmidi = thereminQuantize(midi);
    const freq = 440 * Math.pow(2, (qmidi - 69) / 12);
    const timbre = document.getElementById('theremin-timbre')?.value || 'sine';

    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0.0001, now);
    gainNode.connect(compressor);

    const vel01 = Math.max(0, Math.min(1, velocity / 127));
    const targetGain = (0.2 + 0.65 * vel01) * 0.55;
    const damperTime = 0.35;

    // ── Rhodes: non-looped sample with theremin envelope ──────────────────
    if (timbre === 'rhodes') {
      const inst = INSTRUMENTS['rhodes_fm'];
      if (inst?.loaded) {
        const closest = findClosestSample(qmidi, inst.samples);
        const nLayers = inst.velocityLayers || 0;
        const layer = nLayers > 0 ? Math.max(1, Math.min(nLayers, Math.ceil(vel01 * nLayers))) : null;
        const buf = (layer && inst.velBuffers?.[layer]?.[closest.midi]) || inst.buffers[closest.midi];
        if (buf) {
          const source = ctx.createBufferSource();
          source.buffer = buf;
          source.detune.value = (qmidi - closest.midi) * 100;
          // No loop for MIDI playback — natural sample decay + shaped gain
          const lfo = ctx.createOscillator();
          lfo.type = 'sine';
          lfo.frequency.value = 5.2;
          const lfoGain = ctx.createGain();
          lfoGain.gain.setValueAtTime(0, now);
          lfo.connect(lfoGain);
          lfoGain.connect(source.detune);
          source.connect(gainNode);
          lfo.start(); source.start();

          gainNode.gain.linearRampToValueAtTime(targetGain, now + 0.04);
          gainNode.gain.setValueAtTime(targetGain, now + duration);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration + damperTime);
          lfoGain.gain.setTargetAtTime(20, now + 0.4, 0.4);

          const stopAll = () => {
            try { source.stop(); lfo.stop(); } catch (e) {}
            try { gainNode.disconnect(); } catch (e) {}
            if (activeVoices[midi]?.gain === gainNode) delete activeVoices[midi];
          };
          let cleanupId = setTimeout(stopAll, (duration + damperTime + 0.2) * 1000);
          activeVoices[midi] = {
            gain: gainNode,
            source: { stop: (t) => {
              clearTimeout(cleanupId);
              setTimeout(stopAll, Math.max(0, (t - ctx.currentTime) * 1000 + 50));
            }},
          };
          return;
        }
      }
      // Fall through to oscillator sine if Rhodes not loaded yet
    }

    // ── Oscillator timbres (sine / warm / hollow) ─────────────────────────
    const osc1 = ctx.createOscillator();
    osc1.type = timbre === 'hollow' ? 'triangle' : 'sine';
    osc1.frequency.value = freq;

    const osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.detune.value = timbre === 'warm' ? 1200 : 7;
    osc2.frequency.value = freq;

    const osc2gain = ctx.createGain();
    osc2gain.gain.value = timbre === 'warm' ? 0.28 : 0.48;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 5.2;
    const lfoGain = ctx.createGain();
    lfoGain.gain.setValueAtTime(0, now);

    lfo.connect(lfoGain);
    lfoGain.connect(osc1.detune);
    if (timbre !== 'warm') lfoGain.connect(osc2.detune);

    osc1.connect(gainNode);
    osc2.connect(osc2gain);
    osc2gain.connect(gainNode);
    osc1.start(); osc2.start(); lfo.start();

    gainNode.gain.linearRampToValueAtTime(targetGain, now + 0.04);      // 40ms attack
    gainNode.gain.setValueAtTime(targetGain, now + duration);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration + damperTime);
    lfoGain.gain.setTargetAtTime(20, now + 0.4, 0.4);                   // vibrato builds in after 400ms

    const stopAll = () => {
      try { osc1.stop(); osc2.stop(); lfo.stop(); } catch (e) {}
      try { gainNode.disconnect(); } catch (e) {}
      if (activeVoices[midi]?.gain === gainNode) delete activeVoices[midi];
    };
    let cleanupId = setTimeout(stopAll, (duration + damperTime + 0.2) * 1000);

    activeVoices[midi] = {
      gain: gainNode,
      source: { stop: (t) => {
        clearTimeout(cleanupId);
        setTimeout(stopAll, Math.max(0, (t - ctx.currentTime) * 1000 + 50));
      }},
    };
    return;
  }

  const inst = INSTRUMENTS[state.instrument];

  // Visualize velocity
  drawVelBar(velocity);

  // Fade out any existing voice on the same MIDI note (re-trigger)
  // Real piano: re-striking a ringing string blends old vibration with new
  const prev = activeVoices[midi];
  if (prev) {
    const fadeTime = 0.25;
    prev.gain.gain.cancelScheduledValues(now);
    prev.gain.gain.setValueAtTime(prev.gain.gain.value, now);
    prev.gain.gain.exponentialRampToValueAtTime(0.001, now + fadeTime);
    try { prev.source.stop(now + fadeTime + 0.01); } catch (e) {}
    delete activeVoices[midi];
  }

  // Use samples if loaded
  if (inst.loaded) {
    const closest = findClosestSample(midi, inst.samples);

    // Select velocity layer buffer if available
    let buffer = null;
    const nLayers = inst.velocityLayers || 0;
    if (velocityEnabled && nLayers > 0 && inst.velBuffers) {
      // Map MIDI velocity (1-127) to layer (1-N)
      const vel01 = Math.max(0, Math.min(1, velocity / 127));
      const layer = Math.max(1, Math.min(nLayers, Math.ceil(vel01 * nLayers)));
      buffer = inst.velBuffers[layer]?.[closest.midi];
    }
    // Fallback to default buffer
    if (!buffer) buffer = inst.buffers[closest.midi];

    if (buffer) {
      const source = ctx.createBufferSource();
      source.buffer = buffer;

      const semitones = midi - closest.midi;
      if (source.detune) {
        source.detune.value = semitones * 100;
      } else {
        source.playbackRate.value = Math.pow(2, semitones / 12);
      }

      // Velocity-scaled gain (0.2 at pp, 0.85 at fff) — only when velocity enabled
      const vel01 = Math.max(0, Math.min(1, velocity / 127));
      const velGain = !velocityEnabled ? 0.7 : velNormalize ? 0.6 : 0.2 + 0.65 * vel01;
      const gain = ctx.createGain();
      // Damper release: real piano damper takes ~0.3s to mute the string.
      // Hold full gain until note-off, then exponential decay over 0.4s.
      const damperTime = 0.4;
      gain.gain.setValueAtTime(velGain, now);
      gain.gain.setValueAtTime(velGain, now + duration);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration + damperTime);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 18000;
      filter.Q.value = 0.5;

      source.connect(gain);
      gain.connect(filter);
      filter.connect(compressor);
      source.start(0);
      source.stop(now + duration + damperTime + 0.01);
      activeVoices[midi] = { source, gain, filter };
      source.onended = () => { if (activeVoices[midi]?.source === source) delete activeVoices[midi]; };
      return;
    }
  }

  // Fallback: synthesized tone (while samples are loading, or HE sustain)
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const synthGain = ctx.createGain();
  synthGain.gain.setValueAtTime(0.25, now);
  const synthFilter = ctx.createBiquadFilter();
  synthFilter.type = 'lowpass';
  synthFilter.frequency.value = 18000;
  synthFilter.Q.value = 0.5;
  synthGain.connect(synthFilter);
  synthFilter.connect(compressor);

  [
    { ratio: 1, amp: 1.0, type: 'triangle' },
    { ratio: 2, amp: 0.4, type: 'sine' },
    { ratio: 3, amp: 0.15, type: 'sine' },
  ].forEach(h => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = h.type;
    osc.frequency.value = freq * h.ratio;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(h.amp * 0.7, now + 0.006);
    gain.gain.exponentialRampToValueAtTime(h.amp * 0.35, now + 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain);
    gain.connect(synthGain);
    osc.start(now);
    osc.stop(now + duration + 0.05);
  });
}

// Map held-key travel to filter brightness (post-attack pressure expression).
// travel STRIKE_POINT → 300 Hz (muffled), travel 240 (max) → 18000 Hz (open).
// Q=1.5 adds a resonant bump at the cutoff so the sweep is clearly audible.
// Called every ~1ms while key is in 'pressed' state.
function modulatePressure(midi, travelRaw) {
  const voice = activeVoices[midi];
  if (!voice?.filter) return;
  const ctx = getAudioCtx();
  const sp = HEKeyboard.STRIKE_POINT;
  const targetFreq = pressureExprEnabled
    ? 300 * Math.pow(60, Math.max(0, Math.min(1, (travelRaw - sp) / (240 - sp))))  // 300 Hz → 18000 Hz
    : 18000;
  voice.filter.frequency.setTargetAtTime(targetFreq, ctx.currentTime, 0.015);
  voice.filter.Q.setTargetAtTime(pressureExprEnabled ? 1.5 : 0.5, ctx.currentTime, 0.015);
}

function releaseNote(midi, decay = 0.4) {
  const voice = activeVoices[midi];
  if (!voice) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  voice.gain.gain.cancelScheduledValues(now);
  const cur = voice.gain.gain.value;
  voice.gain.gain.setValueAtTime(cur, now);
  if (decay < 0.25) {
    // Staccato: two-stage fade — quick drop to ~15% then tail to silence.
    const t1 = decay * 0.35;
    voice.gain.gain.exponentialRampToValueAtTime(Math.max(0.001, cur * 0.15), now + t1);
  }
  voice.gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
  try { voice.source.stop(now + decay + 0.05); } catch (e) {}
  delete activeVoices[midi];
}

/* ═══════════════════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════════════════ */

function makeClefState() {
  return {
    trials: 0,
    correct: 0,
    streak: 0,
    bestStreak: 0,
    smoothedLoss: 0.5,
    totalTime: 0,
    level: 1,
    lossHistory: [],
    timeHistory: [],
    noteStats: {},
    lastExportTrial: 0,
  };
}

function makeNoteStats() {
  return {
    correct: 0,
    incorrect: 0,
    history: [],
    lastSeenTrial: 0,
    confusedWith: {},
    confusionWeight: 0,
    introduced: false,
  };
}

let state = {
  currentMode: 'read',
  currentClef: 'treble',
  instrument: 'grand_piano',
  midiSong: '',
  muted: false,
  treble: makeClefState(),
  bass: makeClefState(),
  modules: {},
};

function cs() { return state[state.currentClef]; }
function currentNotes() { return state.currentClef === 'treble' ? TREBLE_NOTES : BASS_NOTES; }
function currentLevels() { return state.currentClef === 'treble' ? TREBLE_LEVELS : BASS_LEVELS; }

function getUnlockedNoteIds() {
  const levels = currentLevels();
  const clefState = cs();
  const ids = [];
  for (let i = 0; i < Math.min(clefState.level, levels.length); i++) {
    ids.push(...levels[i]);
  }
  return ids;
}

function getUnlockedNotes() {
  const ids = getUnlockedNoteIds();
  return currentNotes().filter(n => ids.includes(n.id));
}

function ensureNoteStats(noteId) {
  const clefState = cs();
  if (!clefState.noteStats[noteId]) {
    clefState.noteStats[noteId] = makeNoteStats();
  }
  return clefState.noteStats[noteId];
}

function saveState() {
  try {
    const s = JSON.parse(JSON.stringify(state));
    // Trim histories
    ['treble', 'bass'].forEach(clef => {
      if (s[clef].lossHistory.length > MAX_LOSS_HISTORY) {
        s[clef].lossHistory = s[clef].lossHistory.slice(-MAX_LOSS_HISTORY);
      }
      if (s[clef].timeHistory.length > MAX_LOSS_HISTORY) {
        s[clef].timeHistory = s[clef].timeHistory.slice(-MAX_LOSS_HISTORY);
      }
      for (const id in s[clef].noteStats) {
        const ns = s[clef].noteStats[id];
        if (ns.history.length > MAX_HISTORY_PER_NOTE) {
          ns.history = ns.history.slice(-MAX_HISTORY_PER_NOTE);
        }
      }
    });
    // Trim module histories
    if (s.modules) {
      for (const modId in s.modules) {
        const ms = s.modules[modId];
        if (ms.lossHistory && ms.lossHistory.length > MAX_LOSS_HISTORY) {
          ms.lossHistory = ms.lossHistory.slice(-MAX_LOSS_HISTORY);
        }
        if (ms.timeHistory && ms.timeHistory.length > MAX_LOSS_HISTORY) {
          ms.timeHistory = ms.timeHistory.slice(-MAX_LOSS_HISTORY);
        }
        if (ms.itemStats) {
          for (const id in ms.itemStats) {
            const is = ms.itemStats[id];
            if (is.history && is.history.length > MAX_HISTORY_PER_NOTE) {
              is.history = is.history.slice(-MAX_HISTORY_PER_NOTE);
            }
          }
        }
      }
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  } catch (e) { /* ignore */ }
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      // Ensure clef states exist
      if (!state.treble) state.treble = makeClefState();
      if (!state.bass) state.bass = makeClefState();
      if (!state.modules) state.modules = {};
      // Validate instrument exists (may have been renamed/removed)
      if (!INSTRUMENTS[state.instrument] && state.instrument !== 'theremin') {
        state.instrument = 'salamander';
      }
    }
  } catch (e) { /* ignore */ }
}

function exportState() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = `piano-learn-${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importState(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      state = parsed;
      saveState();
      location.reload();
    } catch (e) {
      alert('Invalid file');
    }
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════════════════
   ADAPTIVE NOTE SELECTION
   ═══════════════════════════════════════════════════════ */

function getNoteWeight(noteId) {
  const clefState = cs();
  const stats = ensureNoteStats(noteId);

  if (!stats.introduced) return UNSEEN_WEIGHT;
  if (stats.history.length === 0) return UNSEEN_WEIGHT;

  const recent = stats.history.slice(-RECENT_WINDOW);
  const recentCorrect = recent.filter(h => h.correct).length;
  const errorRate = 1 - (recentCorrect / recent.length);

  // Time factor: slow correct answers still need practice
  const recentTimes = recent.filter(h => h.correct).map(h => h.time);
  let timeFactor = 0;
  if (recentTimes.length > 0) {
    const avgTime = recentTimes.reduce((a, b) => a + b, 0) / recentTimes.length;
    const idealTime = 1500; // 1.5s target
    if (avgTime > idealTime) {
      timeFactor = Math.min(0.5, (avgTime - idealTime) / idealTime * 0.3);
    }
  }

  // Spaced repetition: boost notes not seen recently
  const trialsSince = clefState.trials - stats.lastSeenTrial;
  const recencyBoost = Math.min(0.5, trialsSince / 60);

  // Confusion weight
  const confW = stats.confusionWeight || 0;

  return Math.max(MIN_WEIGHT, 0.15 + errorRate * 1.5 + timeFactor + recencyBoost + confW);
}

function selectNote(excludeId) {
  const unlocked = getUnlockedNotes();
  if (unlocked.length === 0) return null;

  const weights = unlocked.map(n => ({
    note: n,
    weight: getNoteWeight(n.id),
  }));

  // Reduce weight for the note we just did
  if (excludeId) {
    const w = weights.find(w => w.note.id === excludeId);
    if (w) w.weight *= 0.1;
  }

  const totalWeight = weights.reduce((sum, w) => sum + w.weight, 0);
  let r = Math.random() * totalWeight;
  for (const w of weights) {
    r -= w.weight;
    if (r <= 0) return w.note;
  }
  return weights[weights.length - 1].note;
}

/* ═══════════════════════════════════════════════════════
   STAFF RENDERING
   ═══════════════════════════════════════════════════════ */

const staffCanvas = document.getElementById('staff-canvas');
const staffCtx = staffCanvas.getContext('2d');

function staffBottom(clef) {
  return (clef || state.currentClef) === 'treble' ? TREBLE_STAFF_BOTTOM : BASS_STAFF_BOTTOM;
}

function posToY(staffPos, clef) {
  return staffBottom(clef) - staffPos * HALF_SPACE;
}

function yToClefAndPos(y) {
  const mid = (TREBLE_STAFF_BOTTOM + BASS_STAFF_BOTTOM) / 2;
  const clef = y < mid ? 'treble' : 'bass';
  const bottom = clef === 'treble' ? TREBLE_STAFF_BOTTOM : BASS_STAFF_BOTTOM;
  return { clef, pos: Math.round((bottom - y) / HALF_SPACE) };
}

function drawStaff() {
  staffCtx.clearRect(0, 0, staffCanvas.width, staffCanvas.height);
  const isPlay = state.currentMode === 'play';

  // Draw both staves
  ['treble', 'bass'].forEach(clef => {
    const bottom = clef === 'treble' ? TREBLE_STAFF_BOTTOM : BASS_STAFF_BOTTOM;
    // Dim inactive staff in quiz modes
    const active = isPlay || clef === state.currentClef;
    staffCtx.strokeStyle = active ? '#444' : '#282830';
    staffCtx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const y = bottom - i * 2 * HALF_SPACE;
      staffCtx.beginPath();
      staffCtx.moveTo(STAFF_X_START, y);
      staffCtx.lineTo(STAFF_X_END, y);
      staffCtx.stroke();
    }

    // Clef symbol
    staffCtx.fillStyle = active ? '#555' : '#282830';
    staffCtx.font = '52px serif';
    staffCtx.textAlign = 'center';
    if (clef === 'treble') {
      staffCtx.fillText('𝄞', 24, bottom - 2 * HALF_SPACE + 12);
    } else {
      staffCtx.fillText('𝄢', 24, bottom - 6 * HALF_SPACE + 8);
    }
  });

  // Connecting bracket on the left
  staffCtx.strokeStyle = '#444';
  staffCtx.lineWidth = 2;
  const trebleTop = TREBLE_STAFF_BOTTOM - 8 * HALF_SPACE;
  staffCtx.beginPath();
  staffCtx.moveTo(STAFF_X_START, trebleTop);
  staffCtx.lineTo(STAFF_X_START, BASS_STAFF_BOTTOM);
  staffCtx.stroke();
}

function drawNoteOnStaff(note, color = '#e0e0e0', x = NOTE_X, clef, accidental) {
  const c = clef || state.currentClef;
  const y = posToY(note.pos, c);

  // Ledger lines
  staffCtx.strokeStyle = color === '#e0e0e0' ? '#666' : color;
  staffCtx.lineWidth = 1.5;
  if (note.pos <= -2) {
    for (let p = -2; p >= note.pos; p -= 2) {
      const ly = posToY(p, c);
      staffCtx.beginPath();
      staffCtx.moveTo(x - 16, ly);
      staffCtx.lineTo(x + 16, ly);
      staffCtx.stroke();
    }
  }
  if (note.pos >= 10) {
    for (let p = 10; p <= note.pos; p += 2) {
      const ly = posToY(p, c);
      staffCtx.beginPath();
      staffCtx.moveTo(x - 16, ly);
      staffCtx.lineTo(x + 16, ly);
      staffCtx.stroke();
    }
  }

  // Note head
  staffCtx.fillStyle = color;
  staffCtx.beginPath();
  staffCtx.ellipse(x, y, NOTE_RADIUS + 1, NOTE_RADIUS - 1, -0.2, 0, Math.PI * 2);
  staffCtx.fill();

  // Stem
  staffCtx.strokeStyle = color;
  staffCtx.lineWidth = 2;
  const stemUp = note.pos < 4;
  const stemX = stemUp ? x + NOTE_RADIUS : x - NOTE_RADIUS;
  const stemEndY = stemUp ? y - STEM_LENGTH : y + STEM_LENGTH;
  staffCtx.beginPath();
  staffCtx.moveTo(stemX, y);
  staffCtx.lineTo(stemX, stemEndY);
  staffCtx.stroke();

  // Accidental (sharp/flat symbol to the left of note)
  if (accidental) {
    staffCtx.fillStyle = color;
    staffCtx.font = 'bold 16px serif';
    staffCtx.textAlign = 'center';
    staffCtx.fillText(accidental, x - 16, y + 5);
  }
}

function drawNoteLabel(note, color = '#00ffff', x = NOTE_X, clef, labelOverride) {
  const c = clef || state.currentClef;
  const y = posToY(note.pos, c);
  staffCtx.fillStyle = color;
  staffCtx.font = 'bold 16px Segoe UI, Arial';
  staffCtx.textAlign = 'center';
  const labelX = note.pos < 4 ? x + 22 : x - 22;
  staffCtx.fillText(labelOverride || note.id, labelX, y + 5);
}

function drawGhostNote(pos, color = '#00ffff44', clef) {
  const c = clef || state.currentClef;
  const y = posToY(pos, c);
  staffCtx.fillStyle = color;
  staffCtx.beginPath();
  staffCtx.arc(NOTE_X, y, NOTE_RADIUS + 2, 0, Math.PI * 2);
  staffCtx.fill();

  // Ledger line hint
  staffCtx.strokeStyle = '#ffffff22';
  staffCtx.lineWidth = 1;
  if (pos <= -2 && pos % 2 === 0) {
    staffCtx.beginPath();
    staffCtx.moveTo(NOTE_X - 16, y);
    staffCtx.lineTo(NOTE_X + 16, y);
    staffCtx.stroke();
  }
  if (pos >= 10 && pos % 2 === 0) {
    staffCtx.beginPath();
    staffCtx.moveTo(NOTE_X - 16, y);
    staffCtx.lineTo(NOTE_X + 16, y);
    staffCtx.stroke();
  }
}

// Draw all notes in playModeNotes array on the staff as a chord.
// Notes at the same or adjacent staff positions (e.g. F and F#) are staggered
// horizontally following standard notation practice.
function drawAllPlayModeNotes() {
  // Sort low to high by staff position
  const sorted = [...playModeNotes].sort((a, b) => a.note.pos - b.note.pos);
  let x = NOTE_X;
  let prevPos = null;
  let prevX = null;
  sorted.forEach((pn) => {
    if (prevPos !== null) {
      if (Math.abs(pn.note.pos - prevPos) <= 1) {
        // Adjacent or unison: stagger right of previous note head
        x = prevX + NOTE_RADIUS * 2 + 4;
      } else {
        x = prevX + 28;
      }
    }
    drawNoteOnStaff(pn.note, '#00ffff', x, pn.clef, pn.accidental);
    drawNoteLabel(pn.note, '#00ffff', x, pn.clef, pn.label);
    prevPos = pn.note.pos;
    prevX = x;
  });
}

// ── Note Trail (scrolling released notes) + Guide (upcoming notes from right) ──

const GUIDE_LOOKAHEAD = 3.0; // seconds of look-ahead for upcoming notes
let midiGuideEvents = null;  // reference to MidiPlayer events during playback
let midiGuideStart = 0;      // performance.now() when playback started
let midiGuideIdx = 0;        // index of first event not yet fully past

function addToNoteTrail(midi, clef, note, accidental, label) {
  const now = performance.now();
  noteTrail.push({ note, clef, accidental, label, midi, birthTime: now, held: true, releaseTime: 0 });
  // Adapt scroll speed via EMA based on note arrival gap
  if (lastNoteTime > 0) {
    const gap = (now - lastNoteTime) / 1000;
    const targetSpeed = Math.max(40, Math.min(300, 100 / gap));
    trailSpeed = trailSpeed * 0.7 + targetSpeed * 0.3;
  }
  lastNoteTime = now;
  if (!trailAnimId) trailAnimId = requestAnimationFrame(animateNoteTrail);
}

function releaseFromNoteTrail(midi) {
  const entry = noteTrail.find(e => e.midi === midi && e.held);
  if (entry) {
    entry.held = false;
    entry.releaseTime = performance.now();
  }
}

function animateNoteTrail() {
  const now = performance.now();
  // Compute x positions and cull off-screen entries
  noteTrail = noteTrail.filter(e => {
    if (e.held) return true;
    const x = NOTE_X - ((now - e.releaseTime) / 1000) * trailSpeed;
    return x > STAFF_X_START - 20;
  });

  drawStaff();

  // Redraw current trial note in quiz modes so animation loop doesn't erase it
  if (currentNote && (state.currentMode === 'read' || state.currentMode === 'find')) {
    drawNoteOnStaff(currentNote);
  }

  // Draw play line when MIDI guide is active
  if (midiGuideEvents) {
    staffCtx.save();
    staffCtx.strokeStyle = '#00ffff33';
    staffCtx.lineWidth = 2;
    staffCtx.setLineDash([4, 4]);
    const trebleTop = TREBLE_STAFF_BOTTOM - 8 * HALF_SPACE;
    staffCtx.beginPath();
    staffCtx.moveTo(NOTE_X, trebleTop);
    staffCtx.lineTo(NOTE_X, BASS_STAFF_BOTTOM);
    staffCtx.stroke();
    staffCtx.restore();
  }

  for (const e of noteTrail) {
    let x, color;
    if (e.held) {
      x = NOTE_X;
      color = '#00ffff';
    } else {
      x = NOTE_X - ((now - e.releaseTime) / 1000) * trailSpeed;
      const alpha = Math.max(0, (x - STAFF_X_START) / (NOTE_X - STAFF_X_START));
      const r = 0, g = Math.round(180 * alpha), b = Math.round(180 * alpha);
      color = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
    }
    drawNoteOnStaff(e.note, color, x, e.clef, e.accidental);
    drawNoteLabel(e.note, color, x, e.clef, e.label);
  }

  // Draw guide notes approaching from the right
  if (midiGuideEvents) {
    // In follow mode: advance virtual clock (capped at current beat, so notes scroll
    // in at real tempo and stop at the play line until user presses the right key)
    if (MidiFollow.active) {
      MidiFollow.tick(now);
      midiGuideStart = now - MidiFollow.guideTime * 1000;
    }
    const elapsed = (now - midiGuideStart) / 1000;
    const guideRange = STAFF_X_END - NOTE_X;
    const pxPerSec = guideRange / GUIDE_LOOKAHEAD;
    const followBeatTime = MidiFollow.active && midiGuideEvents.length
      ? (midiGuideEvents.find(e => e.time >= elapsed - 0.05)?.time ?? elapsed)
      : null;
    // Advance index past notes whose duration has fully elapsed
    while (midiGuideIdx < midiGuideEvents.length) {
      const ev = midiGuideEvents[midiGuideIdx];
      const endTime = ev.time + (ev.duration || 0);
      if (endTime >= elapsed - 0.05 || ev.time >= elapsed - 0.1) break;
      midiGuideIdx++;
    }
    for (let i = midiGuideIdx; i < midiGuideEvents.length; i++) {
      const e = midiGuideEvents[i];
      const dt = e.time - elapsed;
      if (dt > GUIDE_LOOKAHEAD) break;
      const dur = e.duration || 0;
      const endTime = e.time + dur;
      // Note is past play line and duration fully elapsed — skip
      if (dt < 0 && elapsed >= endTime) continue;
      let info = midiToStaffNote(e.midi, 'treble');
      let clef = 'treble';
      if (!info) { info = midiToStaffNote(e.midi, 'bass'); clef = 'bass'; }
      if (!info) continue;
      // Gold for current beat in follow mode, cyan otherwise
      const isCurrent = followBeatTime !== null && Math.abs(e.time - followBeatTime) < 0.05;
      if (dt >= 0) {
        // Note approaching or at play line
        const frac = dt / GUIDE_LOOKAHEAD;
        const x = NOTE_X + frac * guideRange;
        const alpha = Math.max(0.15, 1.0 - frac * 0.85);
        let color;
        if (isCurrent) {
          color = `rgba(255,170,0,${alpha.toFixed(2)})`;
        } else {
          const g = Math.round(255 * alpha * 0.7), b = Math.round(255 * alpha * 0.7);
          color = `rgba(0,${g},${b},${alpha.toFixed(2)})`;
        }
        // Duration bar
        if (dur > 0.05) {
          const barW = Math.min(dur * pxPerSec, STAFF_X_END - x);
          if (barW > 2) {
            const ny = posToY(info.note.pos, clef);
            staffCtx.save();
            staffCtx.globalAlpha = alpha * 0.4;
            staffCtx.fillStyle = isCurrent ? '#ffaa00' : '#00cccc';
            staffCtx.beginPath();
            staffCtx.roundRect(x, ny - 4, barW, 8, 4);
            staffCtx.fill();
            staffCtx.restore();
          }
        }
        drawNoteOnStaff(info.note, color, x, clef, info.accidental);
      } else {
        // Note past play line — show remaining duration bar shrinking from play line
        const remaining = endTime - elapsed;
        if (remaining > 0 && dur > 0.05) {
          const barW = remaining * pxPerSec;
          if (barW > 1) {
            const ny = posToY(info.note.pos, clef);
            const fadeAlpha = remaining / dur; // fade as duration elapses
            staffCtx.save();
            staffCtx.globalAlpha = fadeAlpha * 0.5;
            staffCtx.fillStyle = isCurrent ? '#ffaa00' : '#00cccc';
            staffCtx.beginPath();
            staffCtx.roundRect(NOTE_X, ny - 4, barW, 8, 4);
            staffCtx.fill();
            staffCtx.restore();
          }
        }
      }
    }

    // ── Key guide: scrolling key labels between staff and piano ──
    const keyGuideCanvas = document.getElementById('key-guide-canvas');
    keyGuideCanvas.style.display = 'block';
    const kgCtx = keyGuideCanvas.getContext('2d');

    // Group guide notes into 50ms buckets and draw one label per group
    const timeBuckets = new Map(); // bucket_key → {x, alpha, isCurrent, labels}
    for (let i = midiGuideIdx; i < midiGuideEvents.length; i++) {
      const e = midiGuideEvents[i];
      const dt = e.time - elapsed;
      if (dt > GUIDE_LOOKAHEAD) break;
      if (dt < 0) continue;
      const frac = dt / GUIDE_LOOKAHEAD;
      const x = NOTE_X + frac * guideRange;
      const alpha = Math.max(0.15, 1.0 - frac * 0.85);
      const isCurrent = followBeatTime !== null && Math.abs(e.time - followBeatTime) < 0.05;
      const tKey = Math.round(e.time * 20); // 50ms buckets
      if (!timeBuckets.has(tKey)) timeBuckets.set(tKey, {x, alpha, isCurrent, labels: []});
      const label = MIDI_TO_KEY_LABEL[e.midi];
      if (label) timeBuckets.get(tKey).labels.push(label);
    }

    const LINE_H = 14;
    const kgH = keyGuideCanvas.height;
    kgCtx.clearRect(0, 0, keyGuideCanvas.width, kgH);

    // Play line
    kgCtx.strokeStyle = '#2a2a3a';
    kgCtx.lineWidth = 1;
    kgCtx.beginPath();
    kgCtx.moveTo(NOTE_X, 0);
    kgCtx.lineTo(NOTE_X, kgH);
    kgCtx.stroke();

    kgCtx.textAlign = 'center';
    // Draw each bucket's labels stacked vertically so chords don't overlap
    function drawKeyLabels(labels, x, alpha, isCurrent, fontSize) {
      kgCtx.font = `bold ${fontSize}px monospace`;
      const topY = (kgH - labels.length * LINE_H) / 2 + LINE_H / 2;
      for (let j = 0; j < labels.length; j++) {
        if (isCurrent) {
          kgCtx.fillStyle = `rgba(255,170,0,${alpha.toFixed(2)})`;
        } else {
          const c = Math.round(180 * alpha);
          kgCtx.fillStyle = `rgba(${c},${c},${c},${alpha.toFixed(2)})`;
        }
        kgCtx.fillText(labels[j], x, topY + j * LINE_H);
      }
    }
    for (const {x, alpha, isCurrent, labels} of timeBuckets.values()) {
      if (!labels.length) continue;
      if (isCurrent && MidiFollow.active) continue; // drawn separately below
      drawKeyLabels(labels, x, alpha, isCurrent, 11);
    }

    // In follow mode, always draw the current beat's label at the play line
    // (scrolling logic above can miss it when dt≈0 or dt<0)
    if (MidiFollow.active && MidiFollow.currentBeat) {
      const curLabels = MidiFollow.currentBeat.notes
        .map(e => MIDI_TO_KEY_LABEL[e.midi]).filter(Boolean);
      if (curLabels.length) {
        drawKeyLabels(curLabels, NOTE_X, 1.0, true, 13);
      }
    }
  } else {
    document.getElementById('key-guide-canvas').style.display = 'none';
  }

  // Keep RAF alive while strike rings are animating or keys are held (pressure bars / press curve)
  let flashActive = HEKeyboard.device &&
    Object.values(HEKeyboard.keyStates).some(st =>
      (st.strikeTime > 0 && (now - st.strikeTime * 1000) < 300) ||
      st.state === 'pressed' || st.state === 'descending'
    );
  if (flashActive) { drawPiano(); drawPressDots(); }

  const hasGuide = midiGuideEvents && midiGuideEvents.length > 0;
  if (noteTrail.length > 0 || hasGuide || flashActive) {
    trailAnimId = requestAnimationFrame(animateNoteTrail);
  } else {
    trailAnimId = null;
  }
}

function stopNoteTrail() {
  if (trailAnimId) { cancelAnimationFrame(trailAnimId); trailAnimId = null; }
  noteTrail = [];
  lastNoteTime = 0;
  trailSpeed = 80;
}

// Find the staff position for any MIDI note (including sharps)
function midiToStaffNote(midi, clef) {
  const notes = clef === 'treble' ? TREBLE_NOTES : BASS_NOTES;
  const natural = notes.find(n => n.midi === midi);
  if (natural) return { note: natural, accidental: null, displayName: natural.id };
  // Sharp: sits on the same line/space as the natural below
  const naturalBelow = notes.find(n => n.midi === midi - 1);
  if (naturalBelow) return { note: naturalBelow, accidental: '♯', displayName: midiToNoteName(midi) };
  return null;
}

/* ═══════════════════════════════════════════════════════
   PIANO KEYBOARD RENDERING
   ═══════════════════════════════════════════════════════ */

const pianoCanvas = document.getElementById('piano-canvas');
const pianoCtx = pianoCanvas.getContext('2d');

// Build key layout
function isBlackKey(midi) {
  const n = midi % 12;
  return [1, 3, 6, 8, 10].includes(n);
}

function midiToNoteName(midi) {
  const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const octave = Math.floor(midi / 12) - 1;
  return names[midi % 12] + octave;
}

let pianoKeys = []; // { midi, x, width, height, isBlack, name }

function buildPianoKeys(startMidi, endMidi) {
  const start = startMidi ?? PIANO_START_MIDI;
  const end = endMidi ?? PIANO_END_MIDI;
  pianoKeys = [];
  const whites = [];
  const blacks = [];
  let whiteX = 0;

  // First pass: white keys
  for (let midi = start; midi <= end; midi++) {
    if (!isBlackKey(midi)) {
      whites.push({ midi, x: whiteX, width: WHITE_WIDTH, height: WHITE_HEIGHT, isBlack: false, name: midiToNoteName(midi) });
      whiteX += WHITE_WIDTH;
    }
  }

  // Update canvas widths — staff matches piano
  pianoCanvas.width = whiteX;
  staffCanvas.width = whiteX;
  document.getElementById('key-guide-canvas').width = whiteX;
  document.getElementById('press-dot-canvas').width = whiteX;
  document.getElementById('press-curve-canvas').width = Math.round(whiteX / 3);
  STAFF_X_END = whiteX - 40;

  // Second pass: black keys positioned relative to the white key just below
  for (let midi = start; midi <= end; midi++) {
    if (isBlackKey(midi)) {
      const prevW = whites.find(w => w.midi === midi - 1);
      if (prevW) {
        blacks.push({
          midi, x: prevW.x + WHITE_WIDTH - BLACK_WIDTH / 2,
          width: BLACK_WIDTH, height: BLACK_HEIGHT,
          isBlack: true, name: midiToNoteName(midi),
        });
      }
    }
  }

  pianoKeys = [...whites, ...blacks];
}

let highlightedPianoKey = null;  // midi to highlight
let pianoKeyColors = {};  // midi -> color for feedback
let pianoKeyFades = {};   // midi -> {color, startMs, durationMs} for fade-out animation
let fadeAnimId = null;

function fadeOutKey(midi, durationMs = 150) {
  const color = pianoKeyColors[midi];
  if (color) pianoKeyFades[midi] = { color, startMs: performance.now(), durationMs };
  delete pianoKeyColors[midi];
  if (!fadeAnimId) fadeAnimId = requestAnimationFrame(tickFades);
}

function tickFades() {
  const now = performance.now();
  let hasActive = false;
  for (const midi of Object.keys(pianoKeyFades)) {
    if ((now - pianoKeyFades[midi].startMs) < pianoKeyFades[midi].durationMs) hasActive = true;
    else delete pianoKeyFades[midi];
  }
  drawPiano();
  fadeAnimId = hasActive ? requestAnimationFrame(tickFades) : null;
}

function drawPiano() {
  pianoCtx.clearRect(0, 0, pianoCanvas.width, pianoCanvas.height);

  const whites = pianoKeys.filter(k => !k.isBlack);
  const blacks = pianoKeys.filter(k => k.isBlack);
  const keyLabels = getKeyLabels();

  // Draw white keys
  whites.forEach(k => {
    const color = pianoKeyColors[k.midi];
    pianoCtx.fillStyle = color || '#f0f0f0';
    pianoCtx.fillRect(k.x, 0, k.width, k.height);
    pianoCtx.strokeStyle = '#999';
    pianoCtx.lineWidth = 1;
    pianoCtx.strokeRect(k.x, 0, k.width, k.height);

    // Note name at bottom of key (C notes only)
    const noteName = k.name.replace(/\d/, '');
    if (noteName === 'C') {
      pianoCtx.fillStyle = color ? '#fff' : '#333';
      pianoCtx.font = 'bold 10px Segoe UI, Arial';
      pianoCtx.textAlign = 'center';
      pianoCtx.fillText(k.name, k.x + k.width / 2, k.height - 6);
    }

    // Keyboard label
    const lbl = keyLabels[k.midi];
    if (lbl) {
      pianoCtx.fillStyle = color ? '#fff' : '#999';
      pianoCtx.textAlign = 'center';
      pianoCtx.textBaseline = 'middle';
      if (lbl.length <= 1) {
        pianoCtx.font = '11px Segoe UI, Arial';
        pianoCtx.fillText(lbl, k.x + k.width / 2, k.height * 0.42);
      } else {
        pianoCtx.save();
        pianoCtx.translate(k.x + k.width / 2, k.height * 0.45);
        pianoCtx.rotate(-Math.PI / 2);
        pianoCtx.font = '9px Segoe UI, Arial';
        pianoCtx.fillText(lbl, 0, 0);
        pianoCtx.restore();
      }
    }
  });

  // Draw black keys
  blacks.forEach(k => {
    const color = pianoKeyColors[k.midi];
    pianoCtx.fillStyle = color || '#222';
    pianoCtx.fillRect(k.x, 0, k.width, k.height);
    pianoCtx.strokeStyle = '#111';
    pianoCtx.lineWidth = 1;
    pianoCtx.strokeRect(k.x, 0, k.width, k.height);

    // Keyboard label
    const lbl = keyLabels[k.midi];
    if (lbl) {
      pianoCtx.fillStyle = color ? '#fff' : '#888';
      pianoCtx.textAlign = 'center';
      pianoCtx.textBaseline = 'middle';
      if (lbl.length <= 1) {
        pianoCtx.font = '9px Segoe UI, Arial';
        pianoCtx.fillText(lbl, k.x + k.width / 2, k.height * 0.7);
      } else {
        pianoCtx.save();
        pianoCtx.translate(k.x + k.width / 2, k.height * 0.5);
        pianoCtx.rotate(-Math.PI / 2);
        pianoCtx.font = '7px Segoe UI, Arial';
        pianoCtx.fillText(lbl, 0, 0);
        pianoCtx.restore();
      }
    }
  });

  // Fade-out overlay for recently released keys
  const nowFade = performance.now();
  for (const [midiStr, f] of Object.entries(pianoKeyFades)) {
    const midi = +midiStr;
    if (pianoKeyColors[midi]) continue; // solid color takes precedence
    const t = (nowFade - f.startMs) / f.durationMs;
    if (t >= 1) continue;
    const pk = pianoKeys.find(p => p.midi === midi);
    if (!pk) continue;
    pianoCtx.globalAlpha = (1 - t) * 0.85;
    pianoCtx.fillStyle = f.color;
    pianoCtx.fillRect(pk.x, 0, pk.width, pk.height);
    pianoCtx.globalAlpha = 1;
    pianoCtx.strokeStyle = pk.isBlack ? '#111' : '#999';
    pianoCtx.lineWidth = 1;
    pianoCtx.strokeRect(pk.x, 0, pk.width, pk.height);
  }
  pianoCtx.globalAlpha = 1;

  // Strike ring animations — drawn last, on top of all keys
  if (HEKeyboard.device) {
    const nowMs = performance.now();
    for (const [key, st] of Object.entries(HEKeyboard.keyStates)) {
      if (st.strikeTime <= 0) continue;
      const age = nowMs - st.strikeTime * 1000;
      if (age > 300) continue;
      const code = HEKeyboard.MATRIX_TO_CODE[key];
      const midi = code ? HEKeyboard.CODE_TO_MIDI[code] : undefined;
      if (midi === undefined) continue;
      const pk = pianoKeys.find(p => p.midi === midi);
      if (!pk) continue;

      const t = age / 300;
      const radius = 5 + t * 20;
      const alpha = 1 - t;
      const cx = pk.x + pk.width / 2;
      const cy = pk.isBlack ? BLACK_HEIGHT * 0.45 : WHITE_HEIGHT * 0.3;

      pianoCtx.beginPath();
      pianoCtx.arc(cx, cy, radius, 0, Math.PI * 2);
      pianoCtx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
      pianoCtx.lineWidth = 2.5 - t * 1.5;
      pianoCtx.stroke();
    }
  }
}

// Dot strip: one white dot per active key, Y moves DOWN as key travels deeper
function drawPressDots() {
  const canvas = document.getElementById('press-dot-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Y-axis ticks: adaptive density based on pixels-per-raw-unit
  // Tick hierarchy (raw units): 1, 2, 5, 10, 30, 60, 120
  // Each level is shown when it's at least 3px apart; labeled when ≥ 22px apart.
  const pxPerRaw = H / 240;
  const LEVELS = [
    { step: 120, color: '#282838', labelColor: '#44445a' },
    { step:  60, color: '#222232', labelColor: '#33334a' },
    { step:  30, color: '#1d1d2d', labelColor: '#2a2a3f' },
    { step:  10, color: '#181826', labelColor: '#232336' },
    { step:   5, color: '#141420', labelColor: '#1e1e30' },
    { step:   2, color: '#11111c', labelColor: '#1a1a28' },
    { step:   1, color: '#0e0e18', labelColor: '#161622' },
  ];
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  for (const { step, color, labelColor } of LEVELS) {
    const pxGap = step * pxPerRaw;
    if (pxGap < 3) break; // finer levels invisible at this height
    const showLabel = pxGap >= 22;
    for (let raw = 0; raw <= 240; raw += step) {
      // Only draw at this level if not already covered by a coarser level
      const coveredByCoarser = LEVELS.some(l => l.step > step && raw % l.step === 0);
      if (coveredByCoarser) continue;
      const y = (raw / 240) * H;
      ctx.strokeStyle = color;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      if (showLabel) {
        ctx.fillStyle = labelColor;
        // Label in mm for steps ≥ 60 raw, otherwise in raw units
        const label = step >= 60 ? (raw / 60).toFixed(0) + 'mm'
                    : step >= 6  ? (raw / 60).toFixed(2) + 'mm'
                                 : raw + 'r';
        ctx.fillText(label, 3, y + 1);
      }
    }
  }

  // Trigger threshold line
  const yThresh = (HEKeyboard.STRIKE_POINT / 240) * H;
  ctx.strokeStyle = '#2a3a2a';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.moveTo(0, yThresh); ctx.lineTo(W, yThresh); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#2a3a2a';
  ctx.fillText('▶ ' + (HEKeyboard.STRIKE_POINT / 60).toFixed(1) + 'mm', 3, yThresh - 6);

  for (const [key, st] of Object.entries(HEKeyboard.keyStates)) {
    if (st.travel <= HEKeyboard.NOISE_FLOOR) continue;
    const code = HEKeyboard.MATRIX_TO_CODE[key];
    const midi = code ? HEKeyboard.CODE_TO_MIDI[code] : undefined;
    if (midi === undefined) continue;
    const pk = pianoKeys.find(p => p.midi === midi);
    if (!pk) continue;

    const cx = pk.x + pk.width / 2;
    const cy = 2 + (st.travel / 240) * (H - 4);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Line chart: static snapshot drawn once at strike time, updated on next strike
function drawPressCurve() {
  const canvas = document.getElementById('press-curve-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Trigger threshold line
  const yStrike = (HEKeyboard.STRIKE_POINT / 240) * H;
  ctx.strokeStyle = '#1e2a1e';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, yStrike); ctx.lineTo(W, yStrike); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#2a3a2a';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('trigger', W - 3, yStrike - 3);
  ctx.textAlign = 'left';

  // Draw last 5 strike snapshots, oldest faintest
  for (let i = 0; i < recentStrikes.length; i++) {
    const { trajectory: pts, hue } = recentStrikes[i];
    if (pts.length < 2) continue;
    const alpha = 0.3 + 0.7 * (i / (recentStrikes.length - 1 || 1));
    ctx.strokeStyle = `hsla(${hue},80%,62%,${alpha.toFixed(2)})`;
    ctx.lineWidth = i === recentStrikes.length - 1 ? 2 : 1.5;
    ctx.beginPath();
    for (let j = 0; j < pts.length; j++) {
      const x = (j / (pts.length - 1)) * W;
      const y = (pts[j][1] / 240) * H;
      if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

  }

  // Velocity labels in a row at the bottom, one slot per strike (oldest left → newest right)
  const slotW = W / 5;
  for (let i = 0; i < recentStrikes.length; i++) {
    const { hue, velocity } = recentStrikes[i];
    if (velocity === undefined) continue;
    const alpha = 0.3 + 0.7 * (i / (recentStrikes.length - 1 || 1));
    const color = `hsla(${hue},80%,62%,${alpha.toFixed(2)})`;
    const slotIndex = 5 - recentStrikes.length + i;  // right-align slots so newest is always rightmost
    const x = slotIndex * slotW + slotW / 2;
    ctx.fillStyle = color;
    ctx.font = i === recentStrikes.length - 1 ? 'bold 10px monospace' : '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(velocity, x, H - 3);
  }
}

function getPianoKeyAt(x, y) {
  // Check black keys first (on top)
  const blacks = pianoKeys.filter(k => k.isBlack);
  for (const k of blacks) {
    if (x >= k.x && x <= k.x + k.width && y <= k.height) return k;
  }
  const whites = pianoKeys.filter(k => !k.isBlack);
  for (const k of whites) {
    if (x >= k.x && x <= k.x + k.width && y <= k.height) return k;
  }
  return null;
}

/* ═══════════════════════════════════════════════════════
   CHART RENDERING
   ═══════════════════════════════════════════════════════ */

function renderChart(canvasId, data, label, color, maxVal = 1) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = { top: 20, right: 10, bottom: 25, left: 40 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#060612';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#666';
  ctx.font = '11px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.fillText(label, W / 2, 14);

  if (data.length < 2) {
    ctx.fillStyle = '#444';
    ctx.fillText('Not enough data', W / 2, H / 2);
    return;
  }

  // Grid lines
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (plotH * i) / 4;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();

    ctx.fillStyle = '#444';
    ctx.font = '9px Segoe UI, Arial';
    ctx.textAlign = 'right';
    const val = maxVal * (1 - i / 4);
    ctx.fillText(val.toFixed(1), pad.left - 4, y + 3);
  }

  // Axis labels
  ctx.fillStyle = '#444';
  ctx.textAlign = 'center';
  ctx.fillText('Trials', W / 2, H - 4);

  const visible = data.slice(-500);
  const startIdx = Math.max(0, data.length - 500);

  // Raw points (dots)
  ctx.fillStyle = color + '20';
  visible.forEach((val, i) => {
    const x = pad.left + (i / (visible.length - 1)) * plotW;
    const y = pad.top + (1 - val / maxVal) * plotH;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  });

  // Smoothed line (rolling average)
  const smoothed = [];
  const winSize = 20;
  for (let i = 0; i < visible.length; i++) {
    const start = Math.max(0, i - winSize + 1);
    const slice = visible.slice(start, i + 1);
    smoothed.push(slice.reduce((a, b) => a + b, 0) / slice.length);
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  smoothed.forEach((val, i) => {
    const x = pad.left + (i / (visible.length - 1)) * plotW;
    const y = pad.top + Math.max(0, 1 - val / maxVal) * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

function renderCharts() {
  const clefState = cs();
  renderChart('loss-chart', clefState.lossHistory, 'Loss', '#ff8c00');

  // Time chart: auto-scale max
  const times = clefState.timeHistory;
  let maxTime = 5;
  if (times.length > 0) {
    const recent = times.slice(-100);
    maxTime = Math.max(3, Math.ceil(Math.max(...recent)));
  }
  renderChart('time-chart', clefState.timeHistory, 'Response Time (s)', '#00ccff', maxTime);
}

/* ═══════════════════════════════════════════════════════
   NOTE MASTERY GRID
   ═══════════════════════════════════════════════════════ */

function renderNoteGrid() {
  const grid = document.getElementById('note-grid');
  grid.innerHTML = '';
  const notes = currentNotes();
  const unlocked = getUnlockedNoteIds();
  const clefState = cs();

  notes.forEach(n => {
    const tile = document.createElement('div');
    tile.className = 'note-tile';
    const stats = clefState.noteStats[n.id];
    const isUnlocked = unlocked.includes(n.id);

    if (!isUnlocked) {
      tile.classList.add('locked');
    } else if (!stats || stats.history.length === 0) {
      tile.classList.add('unseen');
    } else {
      const acc = stats.correct / (stats.correct + stats.incorrect);
      if (acc >= 0.85 && stats.history.length >= 10) tile.classList.add('mastered');
      else if (acc < 0.6 && stats.history.length >= 5) tile.classList.add('struggling');
    }

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tile-name';
    nameSpan.textContent = n.id;
    tile.appendChild(nameSpan);

    if (stats && stats.history.length > 0) {
      const accSpan = document.createElement('span');
      accSpan.className = 'tile-acc';
      const acc = Math.round((stats.correct / (stats.correct + stats.incorrect)) * 100);
      accSpan.textContent = acc + '%';
      tile.appendChild(accSpan);
    }

    grid.appendChild(tile);
  });
}

/* ═══════════════════════════════════════════════════════
   MODULE SYSTEM — Shared training module infrastructure
   ═══════════════════════════════════════════════════════ */

const TrainingModules = {};

// --- Music constants ---
const NOTE_NAMES_CHROMATIC = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const INTERVAL_SEMITONES = {
  'm2': 1, 'M2': 2, 'm3': 3, 'M3': 4, 'P4': 5, 'TT': 6,
  'P5': 7, 'm6': 8, 'M6': 9, 'm7': 10, 'M7': 11, 'P8': 12,
};
const INTERVAL_LABELS = {
  'm2': 'Minor 2nd', 'M2': 'Major 2nd', 'm3': 'Minor 3rd', 'M3': 'Major 3rd',
  'P4': 'Perfect 4th', 'TT': 'Tritone', 'P5': 'Perfect 5th', 'm6': 'Minor 6th',
  'M6': 'Major 6th', 'm7': 'Minor 7th', 'M7': 'Major 7th', 'P8': 'Octave',
};
const CHORD_INTERVALS = {
  'major': [0, 4, 7], 'minor': [0, 3, 7], 'dim': [0, 3, 6], 'aug': [0, 4, 8],
  'sus2': [0, 2, 7], 'sus4': [0, 5, 7],
  'dom7': [0, 4, 7, 10], 'maj7': [0, 4, 7, 11], 'min7': [0, 3, 7, 10],
  'dim7': [0, 3, 6, 9], 'hdim7': [0, 3, 6, 10], 'minmaj7': [0, 3, 7, 11],
};

function noteNameToMidi(name) {
  const match = name.match(/^([A-G]#?)(\d+)$/);
  if (!match) return null;
  const idx = NOTE_NAMES_CHROMATIC.indexOf(match[1]);
  if (idx === -1) return null;
  return (parseInt(match[2]) + 1) * 12 + idx;
}

function buildChord(rootMidi, quality) {
  const intervals = CHORD_INTERVALS[quality];
  if (!intervals) return [rootMidi];
  return intervals.map(i => rootMidi + i);
}

// --- Audio utilities ---
function playChord(midiNotes, duration = 2.0) {
  pianoKeyColors = {};
  midiNotes.forEach(midi => {
    playMidiNote(midi, duration);
    const pk = pianoKeys.find(p => p.midi === midi);
    if (pk) {
      pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
    }
  });
  drawPiano();
  setTimeout(() => { pianoKeyColors = {}; drawPiano(); }, duration * 1000);
}

function playSequence(midiNotes, intervalMs = 400, duration = 1.5) {
  return new Promise(resolve => {
    midiNotes.forEach((midi, i) => {
      setTimeout(() => {
        playMidiNote(midi, duration);
        // Highlight key on piano
        pianoKeyColors = {};
        const pk = pianoKeys.find(p => p.midi === midi);
        if (pk) {
          pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
          drawPiano();
        }
        if (i === midiNotes.length - 1) {
          setTimeout(() => { pianoKeyColors = {}; drawPiano(); }, Math.min(intervalMs, duration * 1000));
          resolve();
        }
      }, i * intervalMs);
    });
  });
}

function playClick(accent = false) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = accent ? 1200 : 800;
  gain.gain.setValueAtTime(accent ? 0.5 : 0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  osc.connect(gain);
  gain.connect(compressor);
  osc.start(now);
  osc.stop(now + 0.06);
}

function scheduleMetronome(bpm, beats, accentPattern, callback) {
  const ctx = getAudioCtx();
  const beatDur = 60 / bpm;
  const now = ctx.currentTime + 0.05;
  for (let i = 0; i < beats; i++) {
    const time = now + i * beatDur;
    const accent = accentPattern ? accentPattern[i % accentPattern.length] : (i === 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = accent ? 1200 : 800;
    gain.gain.setValueAtTime(accent ? 0.5 : 0.3, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    osc.connect(gain);
    gain.connect(compressor);
    osc.start(time);
    osc.stop(time + 0.06);
  }
  const totalDur = beats * beatDur;
  if (callback) setTimeout(callback, (totalDur + 0.05) * 1000);
  return now;
}

// --- Module state management ---
function makeModuleState() {
  return {
    trials: 0, correct: 0, streak: 0, bestStreak: 0,
    smoothedLoss: 0.5, totalTime: 0, level: 1,
    lossHistory: [], timeHistory: [], itemStats: {},
    lastExportTrial: 0,
  };
}

function makeItemStats() {
  return {
    correct: 0, incorrect: 0, history: [],
    lastSeenTrial: 0, confusedWith: {}, confusionWeight: 0,
  };
}

function getModuleState(moduleId) {
  if (!state.modules) state.modules = {};
  if (!state.modules[moduleId]) state.modules[moduleId] = makeModuleState();
  return state.modules[moduleId];
}

function ensureItemStats(moduleId, itemId) {
  const ms = getModuleState(moduleId);
  if (!ms.itemStats[itemId]) ms.itemStats[itemId] = makeItemStats();
  return ms.itemStats[itemId];
}

function getItemWeight(moduleId, itemId) {
  const ms = getModuleState(moduleId);
  const stats = ensureItemStats(moduleId, itemId);
  if (stats.history.length === 0) return UNSEEN_WEIGHT;

  const recent = stats.history.slice(-RECENT_WINDOW);
  const recentCorrect = recent.filter(h => h.correct).length;
  const errorRate = 1 - (recentCorrect / recent.length);

  const recentTimes = recent.filter(h => h.correct).map(h => h.time);
  let timeFactor = 0;
  if (recentTimes.length > 0) {
    const avgTime = recentTimes.reduce((a, b) => a + b, 0) / recentTimes.length;
    const idealTime = 2000;
    if (avgTime > idealTime) {
      timeFactor = Math.min(0.5, (avgTime - idealTime) / idealTime * 0.3);
    }
  }

  const trialsSince = ms.trials - stats.lastSeenTrial;
  const recencyBoost = Math.min(0.5, trialsSince / 60);
  const confW = stats.confusionWeight || 0;

  return Math.max(MIN_WEIGHT, 0.15 + errorRate * 1.5 + timeFactor + recencyBoost + confW);
}

function selectItem(moduleId, items, excludeId) {
  if (items.length === 0) return null;
  const weights = items.map(item => ({
    item,
    weight: getItemWeight(moduleId, item.id),
  }));
  if (excludeId) {
    const w = weights.find(w => w.item.id === excludeId);
    if (w) w.weight *= 0.1;
  }
  const totalWeight = weights.reduce((sum, w) => sum + w.weight, 0);
  let r = Math.random() * totalWeight;
  for (const w of weights) {
    r -= w.weight;
    if (r <= 0) return w.item;
  }
  return weights[weights.length - 1].item;
}

function recordModuleAnswer(moduleId, itemId, correct, timeTaken, confusionId) {
  if (timeTaken > AFK_THRESHOLD) return false;
  const ms = getModuleState(moduleId);
  ms.trials++;
  if (correct) ms.correct++;
  ms.streak = correct ? ms.streak + 1 : 0;
  if (ms.streak > ms.bestStreak) ms.bestStreak = ms.streak;
  ms.totalTime += timeTaken;

  const rawLoss = correct ? 0 : 1;
  ms.smoothedLoss = EMA_ALPHA * rawLoss + (1 - EMA_ALPHA) * ms.smoothedLoss;
  ms.lossHistory.push(rawLoss);
  ms.timeHistory.push(timeTaken / 1000);

  const stats = ensureItemStats(moduleId, itemId);
  if (correct) stats.correct++; else stats.incorrect++;
  stats.history.push({ correct, time: timeTaken, trial: ms.trials });
  stats.lastSeenTrial = ms.trials;

  if (!correct && confusionId) {
    if (!stats.confusedWith[confusionId]) stats.confusedWith[confusionId] = 0;
    stats.confusedWith[confusionId]++;
    stats.confusionWeight = Math.min(2, (stats.confusionWeight || 0) + 0.5);
  }

  for (const id in ms.itemStats) {
    const is = ms.itemStats[id];
    if (is.confusionWeight) is.confusionWeight *= 0.95;
  }
  return true;
}

function checkModuleLevelUnlock(moduleId, levels) {
  const ms = getModuleState(moduleId);
  if (ms.level >= levels.length) return false;
  const currentLevelItems = levels[ms.level - 1];
  let learnedCount = 0;
  for (const id of currentLevelItems) {
    const stats = ms.itemStats[id];
    if (stats && stats.history.length >= 5) {
      const recent = stats.history.slice(-RECENT_WINDOW);
      const recentCorrect = recent.filter(h => h.correct).length;
      if (recentCorrect / recent.length >= (1 - UNLOCK_THRESHOLD)) learnedCount++;
    }
  }
  if (learnedCount / currentLevelItems.length >= UNLOCK_RATIO) {
    ms.level++;
    return true;
  }
  return false;
}

function getUnlockedItems(moduleId, levels, allItems) {
  const ms = getModuleState(moduleId);
  const ids = [];
  for (let i = 0; i < Math.min(ms.level, levels.length); i++) {
    ids.push(...levels[i]);
  }
  return allItems.filter(item => ids.includes(item.id));
}

// --- Module registration ---
function registerModule(id, config) {
  TrainingModules[id] = config;
  const tabContainer = document.querySelector('.mode-tabs');
  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.dataset.mode = id;
  tab.textContent = config.label;
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.currentMode = id;
    awaitingAnswer = false;
    introducing = false;
    document.getElementById('intro-box').style.display = 'none';
    clearFeedback();
    activateModuleUI(id);
    saveState();
    if (config.startTrial) config.startTrial(null);
  });
  tabContainer.appendChild(tab);
}

// --- Module UI management ---
function cleanupActiveModule() {
  // Clean up the currently active module (if any) before switching away
  const prevMode = state.currentMode;
  const prevMod = TrainingModules[prevMode];
  if (prevMod && prevMod.cleanup) prevMod.cleanup();
  if (feedbackTimeout) { clearTimeout(feedbackTimeout); feedbackTimeout = null; }
  cleanupModuleNext();
}

function activateModuleUI(id) {
  cleanupActiveModule();
  document.getElementById('note-buttons').style.display = 'none';
  document.getElementById('replay-btn').style.display = 'none';
  document.getElementById('mnemonic-hint').textContent = '';
  document.querySelector('.hint-toggle').style.display = 'none';
  staffCanvas.classList.remove('clickable');
  pianoCanvas.classList.remove('clickable');
  const moduleArea = document.getElementById('module-area');
  moduleArea.classList.add('active');
  updateModuleLegend(id);
  updateModuleStatsDisplay(id);
  renderModuleCharts(id);
  renderModuleMasteryGrid(id);
}

let _moduleNextKeyHandler = null;

function moduleNextTrial(callback) {
  // Show a "Next" button in the module area and wait for click or any keypress.
  // Removes itself on trigger or when cleanupActiveModule() clears the area.
  cleanupModuleNext();
  const area = document.getElementById('module-area');
  if (!area) return;

  const btn = document.createElement('button');
  btn.id = 'module-next-btn';
  btn.textContent = 'Next \u2192  (any key)';
  area.appendChild(btn);

  function advance() {
    btn.remove();
    if (_moduleNextKeyHandler) {
      document.removeEventListener('keydown', _moduleNextKeyHandler);
      _moduleNextKeyHandler = null;
    }
    callback();
  }

  btn.addEventListener('click', advance);

  _moduleNextKeyHandler = function (e) {
    // Ignore modifier-only keys
    if (['Shift', 'Control', 'Alt', 'Meta'].includes(e.key)) return;
    e.preventDefault();
    advance();
  };
  document.addEventListener('keydown', _moduleNextKeyHandler);
}

function cleanupModuleNext() {
  if (_moduleNextKeyHandler) {
    document.removeEventListener('keydown', _moduleNextKeyHandler);
    _moduleNextKeyHandler = null;
  }
}

function deactivateModuleUI() {
  cleanupActiveModule();
  const moduleArea = document.getElementById('module-area');
  moduleArea.classList.remove('active');
  moduleArea.innerHTML = '';
  document.querySelector('.hint-toggle').style.display = '';
  updateModuleLegend(null);
}

function updateModuleLegend(id) {
  const legend = document.getElementById('module-legend');
  const content = document.getElementById('legend-content');
  if (!legend || !content) return;
  if (id && MODULE_LEGENDS[id]) {
    content.innerHTML = MODULE_LEGENDS[id];
    legend.classList.add('active');
  } else {
    legend.classList.remove('active');
  }
}

function updateModuleStatsDisplay(id) {
  const ms = getModuleState(id);
  document.getElementById('stat-trials').textContent = ms.trials;
  document.getElementById('stat-streak').textContent = ms.streak;
  document.getElementById('stat-best').textContent = ms.bestStreak;
  if (ms.trials > 0) {
    document.getElementById('stat-accuracy').textContent = Math.round((ms.correct / ms.trials) * 100) + '%';
    document.getElementById('stat-time').textContent = (ms.totalTime / ms.trials / 1000).toFixed(1) + 's';
    document.getElementById('stat-loss').textContent = ms.smoothedLoss.toFixed(3);
  } else {
    document.getElementById('stat-accuracy').textContent = '--';
    document.getElementById('stat-time').textContent = '--';
    document.getElementById('stat-loss').textContent = '--';
  }
  const mod = TrainingModules[id];
  if (mod) {
    document.getElementById('stat-level').textContent = ms.level + '/' + mod.getLevels().length;
  }
}

function renderModuleCharts(id) {
  const ms = getModuleState(id);
  renderChart('loss-chart', ms.lossHistory, 'Loss', '#ff8c00');
  const times = ms.timeHistory;
  let maxTime = 5;
  if (times.length > 0) {
    const recent = times.slice(-100);
    maxTime = Math.max(3, Math.ceil(Math.max(...recent)));
  }
  renderChart('time-chart', ms.timeHistory, 'Response Time (s)', '#00ccff', maxTime);
}

function renderModuleMasteryGrid(id) {
  const grid = document.getElementById('note-grid');
  grid.innerHTML = '';
  const mod = TrainingModules[id];
  if (!mod) return;
  const allItems = mod.getItems();
  const levels = mod.getLevels();
  const ms = getModuleState(id);
  const unlockedIds = [];
  for (let i = 0; i < Math.min(ms.level, levels.length); i++) {
    unlockedIds.push(...levels[i]);
  }
  allItems.forEach(item => {
    const tile = document.createElement('div');
    tile.className = 'note-tile wide';
    const stats = ms.itemStats[item.id];
    const isUnlocked = unlockedIds.includes(item.id);
    if (!isUnlocked) {
      tile.classList.add('locked');
    } else if (!stats || stats.history.length === 0) {
      tile.classList.add('unseen');
    } else {
      const acc = stats.correct / (stats.correct + stats.incorrect);
      if (acc >= 0.85 && stats.history.length >= 10) tile.classList.add('mastered');
      else if (acc < 0.6 && stats.history.length >= 5) tile.classList.add('struggling');
    }
    const nameSpan = document.createElement('span');
    nameSpan.className = 'tile-name';
    nameSpan.textContent = item.label || item.id;
    tile.appendChild(nameSpan);
    if (stats && stats.history.length > 0) {
      const accSpan = document.createElement('span');
      accSpan.className = 'tile-acc';
      accSpan.textContent = Math.round((stats.correct / (stats.correct + stats.incorrect)) * 100) + '%';
      tile.appendChild(accSpan);
    }
    grid.appendChild(tile);
  });
}

function checkLevelUnlock() {
  const clefState = cs();
  const levels = currentLevels();
  if (clefState.level >= levels.length) return;

  // Check if UNLOCK_RATIO of current level's notes are "learned"
  const currentLevelNotes = levels[clefState.level - 1];
  let learnedCount = 0;
  for (const id of currentLevelNotes) {
    const stats = clefState.noteStats[id];
    if (stats && stats.history.length >= 5) {
      const recent = stats.history.slice(-RECENT_WINDOW);
      const recentCorrect = recent.filter(h => h.correct).length;
      const recentLoss = 1 - (recentCorrect / recent.length);
      if (recentLoss < UNLOCK_THRESHOLD) learnedCount++;
    }
  }

  if (learnedCount / currentLevelNotes.length >= UNLOCK_RATIO) {
    clefState.level++;
    showResult(`Level ${clefState.level} unlocked!`, 'correct');
  }
}

  clearFeedback();
  showResult('', '');
  const midiConnected = document.getElementById('midi-in-status')?.dataset.names;
  if (!midiConnected) document.getElementById('full-kb-label').style.display = 'none';

  // Module dispatch: if current mode is a registered module, delegate to it
  if (TrainingModules[state.currentMode]) {
    const mod = TrainingModules[state.currentMode];
    if (mod.startTrial) mod.startTrial(null);
    return;
  }

  // Play mode: no quiz, just interactive staff + keyboard
  if (state.currentMode === 'play') {
    awaitingAnswer = false;
    currentNote = null;
    playModeNotes = [];
    stopNoteTrail();
    document.getElementById('note-buttons').style.display = 'none';
    document.getElementById('replay-btn').style.display = 'none';
    staffCanvas.classList.add('clickable');
    pianoCanvas.classList.add('clickable');
    document.getElementById('full-kb-label').style.display = '';
    showResult('Click the staff or piano to play notes', '');
    drawStaff();
    pianoKeyColors = {};
    drawPiano();
    return;
  }

  const prevId = currentNote ? currentNote.id : null;
  const note = selectNote(prevId);

  if (!note) return;

  // Check if this note needs introduction
  const stats = ensureNoteStats(note.id);
  if (!stats.introduced) {
    introduceNote(note);
    return;
  }

  currentNote = note;
  trialStart = Date.now();
  awaitingAnswer = true;

  renderTrial();
}

function introduceNote(note) {
  introducing = true;
  awaitingAnswer = false;
  currentNote = note;

  const stats = ensureNoteStats(note.id);
  stats.introduced = true;

  // Show introduction
  document.getElementById('note-buttons').style.display = 'none';
  document.getElementById('replay-btn').style.display = 'none';

  const introBox = document.getElementById('intro-box');
  introBox.style.display = 'block';
  document.getElementById('intro-name').textContent = `NEW: ${note.id}`;

  // Show position hint
  const posOnStaff = note.pos;
  let posDesc = '';
  if (posOnStaff >= 0 && posOnStaff <= 8) {
    posDesc = posOnStaff % 2 === 0 ? 'on a line' : 'in a space';
  } else if (posOnStaff === -1 || posOnStaff === 9) {
    posDesc = posOnStaff < 0 ? 'just below the staff' : 'just above the staff';
  } else if (posOnStaff < 0) {
    posDesc = 'below the staff, on a ledger line';
  } else {
    posDesc = 'above the staff, on a ledger line';
  }
  document.getElementById('intro-hint').textContent = `${note.name} — ${posDesc}`;

  // Draw the note with label
  drawStaff();
  drawNoteOnStaff(note, '#00ffff');
  drawNoteLabel(note, '#00ffff');

  // Highlight on piano
  pianoKeyColors = {};
  pianoKeyColors[note.midi] = '#00aaaa';
  drawPiano();

  // Play the note
  playMidiNote(note.midi);

  saveState();
}

function renderTrial() {
  drawStaff();

  const mode = state.currentMode;

  if (mode === 'read' || mode === 'find') {
    // Show note on staff
    drawNoteOnStaff(currentNote);
    document.getElementById('note-buttons').style.display = mode === 'read' ? 'flex' : 'none';
    document.getElementById('replay-btn').style.display = 'none';
    staffCanvas.classList.remove('clickable');
    pianoCanvas.classList.toggle('clickable', mode === 'find');
    // In Find mode, also play the note so user can associate sound + staff + key
    if (mode === 'find') playMidiNote(currentNote.midi);
  } else if (mode === 'listen') {
    // Don't show note — user must place it
    document.getElementById('note-buttons').style.display = 'none';
    document.getElementById('replay-btn').style.display = 'block';
    staffCanvas.classList.add('clickable');
    pianoCanvas.classList.remove('clickable');
    // Play the note
    playMidiNote(currentNote.midi);
  }

  pianoKeyColors = {};
  drawPiano();
}

function handleAnswer(answerId, answerMidi) {
  if (!awaitingAnswer || !currentNote) return;
  awaitingAnswer = false;

  const timeTaken = Date.now() - trialStart;
  if (timeTaken > AFK_THRESHOLD) {
    // AFK — skip this trial
    startTrial();
    return;
  }

  const clefState = cs();
  const mode = state.currentMode;
  let isCorrect = false;

  if (mode === 'read') {
    // answerId is the note letter name (C, D, E...)
    isCorrect = answerId === currentNote.name;
  } else if (mode === 'listen') {
    // answerId is a note id like 'E4'
    isCorrect = answerId === currentNote.id;
  } else if (mode === 'find') {
    // answerMidi is the midi number of the clicked key
    isCorrect = answerMidi === currentNote.midi;
  }

  // Update stats
  clefState.trials++;
  if (isCorrect) clefState.correct++;
  clefState.streak = isCorrect ? clefState.streak + 1 : 0;
  if (clefState.streak > clefState.bestStreak) clefState.bestStreak = clefState.streak;
  clefState.totalTime += timeTaken;

  // Loss calculation
  const rawLoss = isCorrect ? 0 : 1;
  clefState.smoothedLoss = EMA_ALPHA * rawLoss + (1 - EMA_ALPHA) * clefState.smoothedLoss;
  clefState.lossHistory.push(rawLoss);
  clefState.timeHistory.push(timeTaken / 1000);

  // Per-note stats
  const noteStats = ensureNoteStats(currentNote.id);
  if (isCorrect) noteStats.correct++; else noteStats.incorrect++;
  noteStats.history.push({ correct: isCorrect, time: timeTaken, trial: clefState.trials });
  noteStats.lastSeenTrial = clefState.trials;

  // Confusion tracking (for Read mode)
  if (!isCorrect && mode === 'read') {
    if (!noteStats.confusedWith[answerId]) noteStats.confusedWith[answerId] = 0;
    noteStats.confusedWith[answerId]++;
    noteStats.confusionWeight = Math.min(2, (noteStats.confusionWeight || 0) + 0.5);
  }

  // Decay confusion weights for all notes
  for (const id in clefState.noteStats) {
    const ns = clefState.noteStats[id];
    if (ns.confusionWeight) ns.confusionWeight *= 0.95;
  }

  // Show feedback
  showFeedback(isCorrect, answerId, answerMidi, timeTaken);

  // Check level unlock
  checkLevelUnlock();

  // Update display
  updateStatsDisplay();
  renderCharts();
  renderNoteGrid();

  // Save
  saveState();

  // Auto-export
  if (clefState.trials - clefState.lastExportTrial >= AUTO_EXPORT_INTERVAL) {
    clefState.lastExportTrial = clefState.trials;
    // Don't auto-download, just save
  }

  // Next trial: Find mode waits for user input, others auto-advance
  if (mode === 'find') {
    findWaitingToContinue = true;
  } else {
    feedbackTimeout = setTimeout(() => {
      startTrial();
    }, isCorrect ? 800 : 2000);
  }
}

function showFeedback(isCorrect, answerId, answerMidi, timeTaken) {
  const mode = state.currentMode;

  if (isCorrect) {
    showResult(`✓ ${currentNote.id}  (${(timeTaken / 1000).toFixed(1)}s)`, 'correct');
    playMidiNote(currentNote.midi, 0.8);
  } else {
    showResult(`✗ That was ${currentNote.id}`, 'incorrect');
  }

  if (mode === 'read') {
    // Highlight buttons
    document.querySelectorAll('.note-btn').forEach(b => {
      if (b.dataset.note === currentNote.name) b.classList.add('correct');
      else if (b.dataset.note === answerId) b.classList.add('incorrect');
    });
    // Show note label on staff
    if (!isCorrect) drawNoteLabel(currentNote, '#00ff00');
  } else if (mode === 'listen') {
    // Show the correct note on the staff
    drawStaff();
    if (!isCorrect) {
      // Show user's wrong answer in red
      const wrongNote = getUnlockedNotes().find(n => n.id === answerId);
      if (wrongNote) drawNoteOnStaff(wrongNote, '#ff444488');
    }
    drawNoteOnStaff(currentNote, isCorrect ? '#00ff00' : '#00ff00');
    drawNoteLabel(currentNote, '#00ff00');
    playMidiNote(currentNote.midi, 0.8);
  } else if (mode === 'find') {
    // Highlight piano keys
    pianoKeyColors[currentNote.midi] = '#00aa00';
    if (!isCorrect && answerMidi) pianoKeyColors[answerMidi] = '#aa0000';
    drawPiano();
    // Show label on staff
    drawNoteLabel(currentNote, isCorrect ? '#00ff00' : '#ff4444');
    if (!isCorrect) playMidiNote(currentNote.midi, 0.8);
  }
}
