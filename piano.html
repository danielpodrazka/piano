// Keyboard input (Read mode)
// Computer keyboard → MIDI mapping (~3.5 octaves, E2–A5)
//
// Bass extension (F2–B2):
//   Shift+z=E2  a=F2  f=G2  k=A2  '=B2
//                 1=F#2  4=G#2  8=A#2
//
// Lower row (C3–E4):
//   z=C3 x=D3 c=E3 v=F3 b=G3 n=A3 m=B3  ,=C4 .=D4 /=E4
//   s=C#3  d=D#3   g=F#3  h=G#3  j=A#3    l=C#4  ;=D#4
//
// Upper row (C4–E5):
//   q=C4 w=D4 e=E4 r=F4 t=G4 y=A4 u=B4  i=C5 o=D5 p=E5
//   2=C#4  3=D#4   5=F#4  6=G#4  7=A#4    9=C#5  0=D#5
//
// Treble extension (F5–A5):
//   [=F5  ]=G5  \=A5
//    -=F#5  ==G#5
//
const KEYBOARD_MAP = {
  // Bass extension: F2–B2
  'a': 41, '1': 42, 'f': 43, '4': 44, 'k': 45, '8': 46, "'": 47,
  // Lower row: C3–E4
  'z': 48, 's': 49, 'x': 50, 'd': 51, 'c': 52,
  'v': 53, 'g': 54, 'b': 55, 'h': 56, 'n': 57, 'j': 58, 'm': 59,
  ',': 60, 'l': 61, '.': 62, ';': 63, '/': 64,
  // Upper row: C4–E5
  'q': 60, '2': 61, 'w': 62, '3': 63, 'e': 64,
  'r': 65, '5': 66, 't': 67, '6': 68, 'y': 69, '7': 70, 'u': 71,
  'i': 72, '9': 73, 'o': 74, '0': 75, 'p': 76,
  // Treble extension: F5–A5
  '[': 77, '-': 78, ']': 79, '=': 80, '\\': 81,
};
const SHIFT_KEY_MAP = { 'z': 40 };  // Shift+Z = E2
const keysHeld = {};  // track held keys to avoid repeat triggers

// Full Keyboard Piano Mode
// Toggled by CapsLock (Keychron Win mode) or PrintScreen (Keychron Mac mode).
// Maps every physical key to a MIDI note via e.code.
// Core piano layout matches KEYBOARD_MAP; extra keys extend the range.
const FULL_PIANO_CODE_MAP = {
  // Chromatic layout: bottom-to-top, left-to-right.
  // Each keyboard row = one ascending chromatic run.
  // L Ctrl (E1) is lowest, side column tops out at C8 (real piano's top note).
  // Covers 81 of 88 standard piano keys (E1–C8) via keyboard, missing only A0–D#1.
  //
  // ── Row 5 (bottom): E1–B1 (Meta/Win skipped — DE intercepts it) ──
  'ControlLeft': 28, 'AltLeft': 29,
  'Space': 30, 'AltRight': 31, 'ControlRight': 32,
  'ArrowLeft': 33, 'ArrowDown': 34, 'ArrowRight': 35,
  // ── Row 4 (ZXCV): C2–C3 ──
  'ShiftLeft': 36, 'KeyZ': 37, 'KeyX': 38, 'KeyC': 39,
  'KeyV': 40, 'KeyB': 41, 'KeyN': 42, 'KeyM': 43,
  'Comma': 44, 'Period': 45, 'Slash': 46, 'ShiftRight': 47, 'ArrowUp': 48,
  // ── Row 3 (ASDF): C#3–C#4  (' = middle C) ──
  'CapsLock': 49, 'PrintScreen': 49,
  'KeyA': 50, 'KeyS': 51, 'KeyD': 52, 'KeyF': 53,
  'KeyG': 54, 'KeyH': 55, 'KeyJ': 56, 'KeyK': 57,
  'KeyL': 58, 'Semicolon': 59, 'Quote': 60, 'Enter': 61,
  // ── Row 2 (QWERTY): D4–D#5 ──
  'Tab': 62, 'KeyQ': 63, 'KeyW': 64, 'KeyE': 65,
  'KeyR': 66, 'KeyT': 67, 'KeyY': 68, 'KeyU': 69,
  'KeyI': 70, 'KeyO': 71, 'KeyP': 72,
  'BracketLeft': 73, 'BracketRight': 74, 'Backslash': 75,
  // ── Row 1 (numbers): E5–F6 ──
  'Backquote': 76, 'Digit1': 77, 'Digit2': 78, 'Digit3': 79,
  'Digit4': 80, 'Digit5': 81, 'Digit6': 82, 'Digit7': 83,
  'Digit8': 84, 'Digit9': 85, 'Digit0': 86,
  'Minus': 87, 'Equal': 88, 'Backspace': 89,
  // ── Row 0 (function): F#6–G7 ──
  'Escape': 90, 'F1': 91, 'F2': 92, 'F3': 93,
  'F4': 94, 'F5': 95, 'F6': 96, 'F7': 97,
  'F8': 98, 'F9': 99, 'F10': 100, 'F11': 101,
  'F12': 102, 'Delete': 103,
  // ── Side column: G#7–C8 (top of standard piano) ──
  'Insert': 104, 'PageUp': 105, 'PageDown': 106, 'Home': 107, 'End': 108,
};

// Reverse map: MIDI note → short keyboard label (built once at load)
// Populated after codeToLabel is defined (see below)
const MIDI_TO_KEY_LABEL = {};

// Convert e.code → short display label for piano key overlay
function codeToLabel(code) {
  if (code.startsWith('Key')) return code.slice(3).toLowerCase();
  if (code.startsWith('Digit')) return code.slice(5);
  return {
    'Comma': ',', 'Period': '.', 'Slash': '/', 'Semicolon': ';', 'Quote': "'",
    'BracketLeft': '[', 'BracketRight': ']', 'Backslash': '\\', 'Backquote': '`',
    'Minus': '-', 'Equal': '=', 'Space': 'Space', 'Enter': 'Enter',
    'Backspace': 'Bksp', 'Tab': 'Tab', 'Escape': 'Esc', 'Delete': 'Del',
    'ShiftLeft': 'LShift', 'ShiftRight': 'RShift',
    'ControlLeft': 'LCtrl', 'ControlRight': 'RCtrl',
    'AltLeft': 'LAlt', 'AltRight': 'RAlt',
    'MetaLeft': 'Win', 'CapsLock': 'Caps', 'PrintScreen': 'PrtSc',
    'ArrowLeft': '\u2190', 'ArrowRight': '\u2192', 'ArrowUp': '\u2191', 'ArrowDown': '\u2193',
    'Insert': 'Ins', 'PageUp': 'PgUp', 'PageDown': 'PgDn', 'Home': 'Home', 'End': 'End',
  }[code] || code;
}

// Populate MIDI_TO_KEY_LABEL from FULL_PIANO_CODE_MAP (done once after codeToLabel defined)
for (const [code, midi] of Object.entries(FULL_PIANO_CODE_MAP)) {
  MIDI_TO_KEY_LABEL[midi] = codeToLabel(code);
}

// Build MIDI → keyboard label map for current mode
function getKeyLabels() {
  const labels = {};
  if (fullPianoMode) {
    for (const [code, midi] of Object.entries(FULL_PIANO_CODE_MAP)) {
      labels[midi] = codeToLabel(code);
    }
  } else {
    for (const [key, midi] of Object.entries(KEYBOARD_MAP)) {
      labels[midi] = key;
    }
    labels[40] = '\u21e7z';
  }
  return labels;
}

let fullPianoMode = false;

function setFullPianoMode(on) {
  fullPianoMode = on;
  // Release all held keys
  Object.keys(keysHeld).forEach(k => delete keysHeld[k]);
  pianoKeyColors = {};
  playModeNotes = [];
  stopNoteTrail();
  // Rebuild piano to cover the active key map's range
  if (on) {
    const vals = Object.values(FULL_PIANO_CODE_MAP);
    buildPianoKeys(Math.min(...vals), Math.max(...vals));
  } else {
    buildPianoKeys();
  }
  drawPiano();
  drawStaff();
  const chk = document.getElementById('full-kb-chk');
  if (chk) chk.checked = on;
}

document.addEventListener('keydown', (e) => {
  // HE keyboard handles input via WebHID — suppress OS key events
  if (HEKeyboard.device) { e.preventDefault(); return; }
  if (!samplesReady) return;
  // Full Piano Mode: every key → piano note
  if (fullPianoMode) {
    e.preventDefault();
    e.stopPropagation();
    // Still dismiss intro if showing
    if (introducing) {
      introducing = false;
      document.getElementById('intro-box').style.display = 'none';
      startTrial();
      return;
    }
    // Find mode: C4 key continues to next trial
    if (findWaitingToContinue && FULL_PIANO_CODE_MAP[e.code] === 60) {
      findWaitingToContinue = false;
      startTrial();
      return;
    }
    const midi = FULL_PIANO_CODE_MAP[e.code];
    if (midi !== undefined && !keysHeld[e.code]) {
      keysHeld[e.code] = true;
      if (MidiFollow.active) { MidiFollow.onNoteOn(midi, 80); return; }
      playMidiNote(midi);
      const pk = pianoKeys.find(p => p.midi === midi);
      if (pk) {
        pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
        drawPiano();
      }
      if (state.currentMode === 'play') {
        const preferClef = state.currentClef;
        const otherClef = preferClef === 'treble' ? 'bass' : 'treble';
        let info = midiToStaffNote(midi, preferClef);
        let noteClef = info ? preferClef : null;
        if (!info) { info = midiToStaffNote(midi, otherClef); noteClef = info ? otherClef : null; }
        if (info && !playModeNotes.some(pn => pn.midi === midi)) {
          playModeNotes.push({ note: info.note, clef: noteClef, accidental: info.accidental, label: info.displayName, midi });
          addToNoteTrail(midi, noteClef, info.note, info.accidental, info.displayName);
        }
        showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
      }
    }
    return;
  }
  // Handle introduction dismissal
  if (introducing) {
    introducing = false;
    document.getElementById('intro-box').style.display = 'none';
    startTrial();
    return;
  }

  // Find mode: C4 key continues to next trial
  if (findWaitingToContinue) {
    const k = e.key.toLowerCase();
    if (k === ',' || k === 'q') {
      findWaitingToContinue = false;
      startTrial();
      return;
    }
  }

  // Computer keyboard piano — skip when a quiz answer is expected
  const k = e.key.toLowerCase();
  const inQuiz = awaitingAnswer && state.currentMode !== 'play';
  // Shift+key check first, then normal map; shift doesn't block normal keys
  let midi, keyId;
  if (e.shiftKey && SHIFT_KEY_MAP[k] !== undefined) {
    midi = SHIFT_KEY_MAP[k];
    keyId = 'shift+' + k;
  } else if (KEYBOARD_MAP[k] !== undefined) {
    midi = KEYBOARD_MAP[k];
    keyId = k;
  }
  if (midi !== undefined && !keysHeld[keyId] && !inQuiz) {
    e.preventDefault();
    keysHeld[keyId] = true;
    playMidiNote(midi);

    // Visual feedback on piano
    const pk = pianoKeys.find(p => p.midi === midi);
    if (pk) {
      pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
      drawPiano();
    }

    // Show note on staff in Play mode
    if (state.currentMode === 'play') {
      const preferClef = state.currentClef;
      const otherClef = preferClef === 'treble' ? 'bass' : 'treble';
      let info = midiToStaffNote(midi, preferClef);
      let noteClef = info ? preferClef : null;
      if (!info) { info = midiToStaffNote(midi, otherClef); noteClef = info ? otherClef : null; }
      if (info && !playModeNotes.some(pn => pn.midi === midi)) {
        playModeNotes.push({ note: info.note, clef: noteClef, accidental: info.accidental, label: info.displayName, midi });
        addToNoteTrail(midi, noteClef, info.note, info.accidental, info.displayName);
      }
      showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
    }
    return;
  }

  // Letter keys for Read mode quiz answers
  if (state.currentMode !== 'read' || !awaitingAnswer) return;
  const key = e.key.toUpperCase();
  if ('ABCDEFG'.includes(key)) {
    handleAnswer(key, null);
  }
});

document.addEventListener('keyup', (e) => {
  if (HEKeyboard.device) { e.preventDefault(); return; }
  // Full Piano Mode keyup
  if (fullPianoMode) {
    e.preventDefault();
    if (keysHeld[e.code]) {
      const midi = FULL_PIANO_CODE_MAP[e.code];
      delete keysHeld[e.code];
      if (midi !== undefined) {
        delete pianoKeyColors[midi];
        if (state.currentMode === 'play') {
          playModeNotes = playModeNotes.filter(pn => pn.midi !== midi);
          releaseFromNoteTrail(midi);
          showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
        }
        drawPiano();
      }
    }
    return;
  }
  const k = e.key.toLowerCase();
  // Release both normal and shift variants
  for (const keyId of [k, 'shift+' + k]) {
    if (keysHeld[keyId]) {
      const midi = keyId.startsWith('shift+') ? SHIFT_KEY_MAP[k] : KEYBOARD_MAP[k];
      delete keysHeld[keyId];
      if (midi !== undefined) {
        delete pianoKeyColors[midi];
        // Remove note from play mode array
        if (state.currentMode === 'play') {
          playModeNotes = playModeNotes.filter(pn => pn.midi !== midi);
          releaseFromNoteTrail(midi);
          showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
        }
      }
    }
  }
  drawPiano();
});

// Staff canvas click (Listen + Play modes)
staffCanvas.addEventListener('click', (e) => {
  const rect = staffCanvas.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const { clef, pos } = yToClefAndPos(y);

  // Play mode: click any note position on either staff to toggle it
  if (state.currentMode === 'play') {
    const notes = clef === 'treble' ? TREBLE_NOTES : BASS_NOTES;
    const clickedNote = notes.find(n => n.pos === pos);
    if (clickedNote) {
      const existIdx = playModeNotes.findIndex(pn => pn.midi === clickedNote.midi);
      if (existIdx !== -1) {
        // Toggle off: remove note
        playModeNotes.splice(existIdx, 1);
        releaseFromNoteTrail(clickedNote.midi);
        delete pianoKeyColors[clickedNote.midi];
      } else {
        // Toggle on: add note
        playModeNotes.push({ note: clickedNote, clef, accidental: null, label: null, midi: clickedNote.midi });
        addToNoteTrail(clickedNote.midi, clef, clickedNote, null, null);
        playMidiNote(clickedNote.midi);
        const pk = pianoKeys.find(p => p.midi === clickedNote.midi);
        pianoKeyColors[clickedNote.midi] = pk && pk.isBlack ? '#006666' : '#00aaaa';
      }
      drawPiano();
      showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
    }
    return;
  }

  // Listen mode: only the active clef responds
  if (state.currentMode !== 'listen' || !awaitingAnswer) return;
  if (clef !== state.currentClef) return;
  const unlocked = getUnlockedNotes();
  const clickedNote = unlocked.find(n => n.pos === pos);
  if (clickedNote) {
    handleAnswer(clickedNote.id, clickedNote.midi);
  }
});

// Staff canvas hover (Listen + Play modes)
let hoverClef = null;
staffCanvas.addEventListener('mousemove', (e) => {
  const isPlay = state.currentMode === 'play';
  const isListen = state.currentMode === 'listen' && awaitingAnswer;
  if (!isPlay && !isListen) return;

  const rect = staffCanvas.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const { clef, pos } = yToClefAndPos(y);

  if (pos !== hoverStaffPos || clef !== hoverClef) {
    hoverStaffPos = pos;
    hoverClef = clef;
    if (!trailAnimId) {
      drawStaff();
      if (isPlay && playModeNotes.length > 0) drawAllPlayModeNotes();
    }
    const notes = isPlay
      ? (clef === 'treble' ? TREBLE_NOTES : BASS_NOTES)
      : getUnlockedNotes();
    const hoverNote = notes.find(n => n.pos === pos);
    if (hoverNote && (isPlay || clef === state.currentClef)) {
      drawGhostNote(pos, '#00ffff44', clef);
    }
  }
});

staffCanvas.addEventListener('mouseleave', () => {
  const isPlay = state.currentMode === 'play';
  const isListen = state.currentMode === 'listen' && awaitingAnswer;
  if (!isPlay && !isListen) return;
  hoverStaffPos = null;
  hoverClef = null;
  if (!trailAnimId) {
    drawStaff();
    if (isPlay && playModeNotes.length > 0) drawAllPlayModeNotes();
  }
});

// Piano canvas click (Find + Play modes)
pianoCanvas.addEventListener('click', (e) => {
  if (!samplesReady) return;
  const rect = pianoCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const key = getPianoKeyAt(x, y);
  if (!key) return;

  // Play mode: click any key to toggle it (add or remove)
  if (state.currentMode === 'play') {
    const existIdx = playModeNotes.findIndex(pn => pn.midi === key.midi);
    if (existIdx !== -1) {
      // Toggle off: remove note
      playModeNotes.splice(existIdx, 1);
      releaseFromNoteTrail(key.midi);
      delete pianoKeyColors[key.midi];
    } else {
      // Toggle on: add note
      playMidiNote(key.midi);
      pianoKeyColors[key.midi] = key.isBlack ? '#006666' : '#00aaaa';

      // Find the note on the staff (try both clefs, prefer selected)
      const preferClef = state.currentClef;
      const otherClef = preferClef === 'treble' ? 'bass' : 'treble';
      let info = midiToStaffNote(key.midi, preferClef);
      let noteClef = info ? preferClef : null;
      if (!info) {
        info = midiToStaffNote(key.midi, otherClef);
        if (info) noteClef = otherClef;
      }
      if (info) {
        playModeNotes.push({ note: info.note, clef: noteClef, accidental: info.accidental, label: info.displayName, midi: key.midi });
        addToNoteTrail(key.midi, noteClef, info.note, info.accidental, info.displayName);
      }
    }
    drawPiano();
    showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
    return;
  }

  // Find mode
  if (state.currentMode !== 'find' || !awaitingAnswer) return;
  if (!key.isBlack) {
    handleAnswer(key.name, key.midi);
  } else {
    showResult('That\'s a sharp/flat key — try a white key', '');
  }
});

// ═══════════════════════════════════════════════════════════════════
// MIDI PLAYER — parse & play .mid files using the app's instruments
// ═══════════════════════════════════════════════════════════════════
const MidiPlayer = (() => {
  let events = [];       // [{time, midi, duration, channel}, ...]
  let timeouts = [];     // scheduled playback timeouts
  let playing = false;
  let startTime = 0;
  let loadGen = 0;       // generation counter to discard stale loads

  function parseMidi(buf) {
    const d = new DataView(buf);
    let p = 0;
    const read = (n) => { const v = []; for (let i = 0; i < n; i++) v.push(d.getUint8(p++)); return v; };
    const readU16 = () => { const v = d.getUint16(p); p += 2; return v; };
    const readU32 = () => { const v = d.getUint32(p); p += 4; return v; };
    const readVLQ = () => { let v = 0; let b; do { b = d.getUint8(p++); v = (v << 7) | (b & 0x7f); } while (b & 0x80); return v; };

    // Header
    p += 4; // MThd
    readU32(); // header length
    const format = readU16();
    const nTracks = readU16();
    const ticksPerBeat = readU16();

    // Parse all tracks
    const allEvents = [];
    for (let t = 0; t < nTracks; t++) {
      p += 4; // MTrk
      const trackLen = readU32();
      const trackEnd = p + trackLen;
      let tick = 0;
      let lastStatus = 0;

      while (p < trackEnd) {
        const delta = readVLQ();
        tick += delta;
        let status = d.getUint8(p);

        if (status < 0x80) {
          status = lastStatus; // running status
        } else {
          p++;
          lastStatus = status;
        }

        const type = status & 0xf0;
        const ch = status & 0x0f;

        if (type === 0x90 || type === 0x80) {
          const note = d.getUint8(p++);
          const vel = d.getUint8(p++);
          allEvents.push({ tick, type: (type === 0x90 && vel > 0) ? 'on' : 'off', note, vel, ch });
        } else if (type === 0xa0 || type === 0xb0 || type === 0xe0) {
          p += 2;
        } else if (type === 0xc0 || type === 0xd0) {
          p += 1;
        } else if (status === 0xff) {
          const metaType = d.getUint8(p++);
          const len = readVLQ();
          if (metaType === 0x51 && len === 3) {
            const tempo = (d.getUint8(p) << 16) | (d.getUint8(p+1) << 8) | d.getUint8(p+2);
            allEvents.push({ tick, type: 'tempo', tempo });
          }
          p += len;
        } else if (status === 0xf0 || status === 0xf7) {
          const len = readVLQ();
          p += len;
        } else {
          p++;
        }
      }
      p = trackEnd;
    }

    // Sort by tick
    allEvents.sort((a, b) => a.tick - b.tick);

    // Convert ticks to seconds and pair note-on/off
    let tempo = 500000; // default 120 BPM
    let tickToSec = tempo / 1e6 / ticksPerBeat;
    let lastTick = 0;
    let currentSec = 0;

    // Assign absolute times
    for (const e of allEvents) {
      currentSec += (e.tick - lastTick) * tickToSec;
      lastTick = e.tick;
      e.time = currentSec;
      if (e.type === 'tempo') {
        tempo = e.tempo;
        tickToSec = tempo / 1e6 / ticksPerBeat;
      }
    }

    // Pair note-on with note-off
    const noteOns = {};
    events = [];
    for (const e of allEvents) {
      if (e.type === 'on') {
        const key = `${e.ch}-${e.note}`;
        noteOns[key] = e;
      } else if (e.type === 'off') {
        const key = `${e.ch}-${e.note}`;
        const on = noteOns[key];
        if (on) {
          events.push({ time: on.time, midi: on.note, duration: Math.max(0.1, e.time - on.time), ch: on.ch, vel: on.vel });
          delete noteOns[key];
        }
      }
    }

    // Any hanging notes: give 1s duration
    for (const key of Object.keys(noteOns)) {
      const on = noteOns[key];
      events.push({ time: on.time, midi: on.note, duration: 1.0, ch: on.ch, vel: on.vel });
    }

    events.sort((a, b) => a.time - b.time);

    // Pre-compute key guide canvas height from max simultaneous notes in any 30ms window
    {
      const LINE_H = 14;
      let maxSimul = 0;
      for (let i = 0; i < events.length; i++) {
        const t = events[i].time;
        const seen = new Set();
        for (let j = i; j < events.length && events[j].time - t < 0.03; j++)
          seen.add(events[j].midi);
        if (seen.size > maxSimul) maxSimul = seen.size;
      }
      const h = Math.max(28, maxSimul * LINE_H + 8);
      document.getElementById('key-guide-canvas').height = h;
    }

    return events.length;
  }

  function play() {
    stop();
    if (!events.length) return;
    playing = true;
    startTime = performance.now();
    midiGuideEvents = events;
    midiGuideStart = startTime;
    midiGuideIdx = 0;
    if (!trailAnimId) trailAnimId = requestAnimationFrame(animateNoteTrail);
    const status = document.getElementById('midi-status');
    const totalDur = events[events.length - 1].time + events[events.length - 1].duration;

    const activeNotes = new Set(); // currently sounding MIDI notes

    for (const e of events) {
      // Schedule note-on
      const onTid = setTimeout(() => {
        playMidiNote(e.midi, Math.min(e.duration, 4), e.vel || 100);
        activeNotes.add(e.midi);
        // Add to note trail
        let info = midiToStaffNote(e.midi, 'treble');
        let clef = 'treble';
        if (!info) { info = midiToStaffNote(e.midi, 'bass'); clef = 'bass'; }
        if (info) addToNoteTrail(e.midi, clef, info.note, info.accidental, info.displayName);
        updateVisuals();
      }, e.time * 1000);
      timeouts.push(onTid);

      // Schedule note-off (visual only)
      const offTid = setTimeout(() => {
        activeNotes.delete(e.midi);
        releaseFromNoteTrail(e.midi);
        updateVisuals();
      }, (e.time + Math.min(e.duration, 2)) * 1000);
      timeouts.push(offTid);
    }

    function updateVisuals() {
      // Piano keyboard highlighting
      pianoKeyColors = {};
      for (const midi of activeNotes) {
        const pk = pianoKeys.find(p => p.midi === midi);
        if (pk) pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
      }
      drawPiano();
      // Staff drawing is handled by the note trail animation loop
    }

    // Update status during playback
    const updateStatus = () => {
      if (!playing) return;
      const elapsed = (performance.now() - startTime) / 1000;
      const mins = Math.floor(elapsed / 60);
      const secs = Math.floor(elapsed % 60);
      const totalMins = Math.floor(totalDur / 60);
      const totalSecs = Math.floor(totalDur % 60);
      status.textContent = `${mins}:${secs.toString().padStart(2,'0')} / ${totalMins}:${totalSecs.toString().padStart(2,'0')}`;
      if (elapsed < totalDur + 2) requestAnimationFrame(updateStatus);
      else { playing = false; status.textContent = 'Done'; pianoKeyColors = {}; midiGuideEvents = null; midiGuideStart = 0; stopNoteTrail(); drawPiano(); drawStaff(); updateButtons(); }
    };
    updateStatus();
    updateButtons();
  }

  function stop() {
    timeouts.forEach(clearTimeout);
    timeouts = [];
    playing = false;
    pianoKeyColors = {};
    midiGuideEvents = null;
    midiGuideStart = 0;
    stopNoteTrail();
    drawPiano();
    drawStaff();
    document.getElementById('midi-status').textContent = events.length ? 'Stopped' : '';
    updateButtons();
  }

  function updateButtons() {
    document.getElementById('midi-play').disabled = !events.length || playing;
    document.getElementById('midi-stop').disabled = !playing;
    document.getElementById('midi-follow').disabled = !events.length;
  }

  async function loadUrl(url) {
    const gen = ++loadGen;
    const status = document.getElementById('midi-status');
    status.textContent = 'Loading...';
    try {
      const resp = await fetch(url);
      if (gen !== loadGen) return; // superseded by newer load
      const buf = await resp.arrayBuffer();
      if (gen !== loadGen) return;
      const count = parseMidi(buf);
      status.textContent = `${count} notes loaded`;
      updateButtons();
    } catch (e) {
      if (gen !== loadGen) return;
      status.textContent = 'Load failed';
      console.warn('MIDI load error:', e);
    }
  }

  function loadFile(file) {
    const status = document.getElementById('midi-status');
    status.textContent = 'Loading...';
    const reader = new FileReader();
    reader.onload = (e) => {
      const count = parseMidi(e.target.result);
      status.textContent = `${count} notes loaded`;
      updateButtons();
    };
    reader.readAsArrayBuffer(file);
  }

  function seekTo(timeSec) {
    if (!events.length) return;
    // Clear all existing scheduled notes
    timeouts.forEach(clearTimeout);
    timeouts = [];
    pianoKeyColors = {};
    stopNoteTrail();
    drawPiano();

    if (!playing) {
      // Not playing — start playback from this point
      playing = true;
    }

    // Adjust startTime so elapsed = timeSec
    startTime = performance.now() - timeSec * 1000;
    midiGuideEvents = events;
    midiGuideStart = startTime;
    // Find the right midiGuideIdx
    midiGuideIdx = 0;
    while (midiGuideIdx < events.length && events[midiGuideIdx].time < timeSec) midiGuideIdx++;
    if (!trailAnimId) trailAnimId = requestAnimationFrame(animateNoteTrail);

    const totalDur = events[events.length - 1].time + events[events.length - 1].duration;
    const activeNotes = new Set();
    const status = document.getElementById('midi-status');

    // Schedule only future notes
    for (const e of events) {
      const noteEnd = e.time + Math.min(e.duration, 2);
      if (noteEnd <= timeSec) continue; // already past

      const onDelay = Math.max(0, (e.time - timeSec) * 1000);
      const onTid = setTimeout(() => {
        const dur = e.time < timeSec ? Math.min(e.duration, 4) - (timeSec - e.time) : Math.min(e.duration, 4);
        playMidiNote(e.midi, Math.max(0.1, dur), e.vel || 100);
        activeNotes.add(e.midi);
        let info = midiToStaffNote(e.midi, 'treble');
        let clef = 'treble';
        if (!info) { info = midiToStaffNote(e.midi, 'bass'); clef = 'bass'; }
        if (info) addToNoteTrail(e.midi, clef, info.note, info.accidental, info.displayName);
        pianoKeyColors = {};
        for (const midi of activeNotes) {
          const pk = pianoKeys.find(p => p.midi === midi);
          if (pk) pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
        }
        drawPiano();
      }, onDelay);
      timeouts.push(onTid);

      const offDelay = Math.max(0, (noteEnd - timeSec) * 1000);
      const offTid = setTimeout(() => {
        activeNotes.delete(e.midi);
        releaseFromNoteTrail(e.midi);
        pianoKeyColors = {};
        for (const midi of activeNotes) {
          const pk = pianoKeys.find(p => p.midi === midi);
          if (pk) pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
        }
        drawPiano();
      }, offDelay);
      timeouts.push(offTid);
    }

    const updateStatus = () => {
      if (!playing) return;
      const elapsed = (performance.now() - startTime) / 1000;
      const mins = Math.floor(elapsed / 60);
      const secs = Math.floor(elapsed % 60);
      const totalMins = Math.floor(totalDur / 60);
      const totalSecs = Math.floor(totalDur % 60);
      status.textContent = `${mins}:${secs.toString().padStart(2,'0')} / ${totalMins}:${totalSecs.toString().padStart(2,'0')}`;
      if (elapsed < totalDur + 2) requestAnimationFrame(updateStatus);
      else { playing = false; status.textContent = 'Done'; pianoKeyColors = {}; midiGuideEvents = null; midiGuideStart = 0; stopNoteTrail(); drawPiano(); drawStaff(); updateButtons(); updateTimeline(); }
    };
    updateStatus();
    updateButtons();
  }

  function getTotalDuration() {
    if (!events.length) return 0;
    return events[events.length - 1].time + events[events.length - 1].duration;
  }

  function getElapsed() {
    if (!playing) return 0;
    return (performance.now() - startTime) / 1000;
  }

  return { play, stop, seekTo, loadUrl, loadFile, getEvents: () => events, get playing() { return playing; }, getTotalDuration, getElapsed };
})();

// --- Velocity Compare Panel ---
(function initVelCompare() {
  const noteNames = ['C', 'Cs', 'D', 'Ds', 'E', 'F', 'Fs', 'G', 'Gs', 'A', 'As', 'B'];
  const prettyName = (m) => {
    const n = noteNames[m % 12]; const oct = Math.floor(m / 12) - 1;
    return n.replace('s', '#') + oct;
  };
  const sel = document.getElementById('vel-compare-note');
  // Populate note selector with the grand piano range
  for (let m = 36; m <= 84; m += 1) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = prettyName(m);
    if (m === 60) opt.selected = true; // default C4
    sel.appendChild(opt);
  }

  // Velocity layer labels and MIDI velocities
  const layers = [
    { label: 'ppp', vel: 16 },
    { label: 'pp',  vel: 33 },
    { label: 'p',   vel: 49 },
    { label: 'mp',  vel: 64 },
    { label: 'mf',  vel: 80 },
    { label: 'f',   vel: 96 },
    { label: 'ff',  vel: 112 },
    { label: 'fff', vel: 127 },
  ];

  const btnContainer = document.getElementById('vel-layer-btns');
  layers.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.textContent = l.label;
    btn.title = `Velocity ${l.vel} (layer ${i + 1})`;
    btn.style.cssText = 'background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;min-width:36px;';
    // Color intensity scales with velocity
    const intensity = 40 + Math.round((i / 7) * 160);
    btn.style.borderColor = `rgb(${intensity}, ${Math.max(0, 200 - intensity)}, 80)`;
    btn.addEventListener('click', () => {
      const midi = parseInt(sel.value);
      playMidiNote(midi, 3.0, l.vel);
    });
    btnContainer.appendChild(btn);
  });

  // Sweep buttons
  let sweepTimer = null;
  function doSweep(ascending) {
    if (sweepTimer) { clearInterval(sweepTimer); sweepTimer = null; }
    const midi = parseInt(sel.value);
    const order = ascending ? [...layers] : [...layers].reverse();
    let idx = 0;
    // Play first immediately
    playMidiNote(midi, 2.0, order[0].vel);
    idx = 1;
    sweepTimer = setInterval(() => {
      if (idx >= order.length) { clearInterval(sweepTimer); sweepTimer = null; return; }
      playMidiNote(midi, 2.0, order[idx].vel);
      idx++;
    }, 700);
  }
  document.getElementById('vel-sweep-btn').addEventListener('click', () => doSweep(true));
  document.getElementById('vel-sweep-down-btn').addEventListener('click', () => doSweep(false));
  document.getElementById('vel-normalize').addEventListener('change', (e) => {
    velNormalize = e.target.checked;
  });

  // Show panel if velocity is already enabled
  if (velocityEnabled) document.getElementById('vel-compare').style.display = '';
})();

// ── MIDI Follow Mode (Synthesia-style: wait for correct key presses) ──
const MidiFollow = (() => {
  let beats = [];     // [{notes: [{midi, duration, vel}], time}]
  let beatIdx = 0;
  let pressedThisBeat = new Set();
  let _active = false;
  let virtualTime = 0;   // seconds, virtual clock advances at real rate but capped at current beat
  let lastWallTime = 0;  // performance.now() ms at last tick
  let loopA = -1;        // beat index for loop start (-1 = not set)
  let loopB = -1;        // beat index for loop end (-1 = not set)
  let _loopEnabled = false;

  // ── Run stats ──
  let runStartTime = 0;      // performance.now() when run started
  let beatStartTime = 0;     // performance.now() when current beat was shown
  let totalErrors = 0;       // wrong notes across the run
  let beatTimings = [];       // ms between beat shown and beat completed
  let perfectDuration = 0;    // song's own duration in seconds (last beat - first beat)
  const FOLLOW_LOG_KEY = 'piano-follow-log-v1';

  function loadFollowLog() {
    try { return JSON.parse(localStorage.getItem(FOLLOW_LOG_KEY)) || []; }
    catch { return []; }
  }
  function saveFollowLog(log) {
    // Keep last 200 entries
    if (log.length > 200) log = log.slice(-200);
    localStorage.setItem(FOLLOW_LOG_KEY, JSON.stringify(log));
  }

  function updateLearnUI() {
    const aEl = document.getElementById('loop-a-label');
    const bEl = document.getElementById('loop-b-label');
    if (aEl) aEl.textContent = loopA >= 0 ? `A: ${loopA + 1}` : 'A: –';
    if (bEl) bEl.textContent = loopB >= 0 ? `B: ${loopB + 1}` : 'B: –';
  }

  function jumpToLoop() {
    beatIdx = loopA;
    virtualTime = beats[loopA].time;
    pressedThisBeat = new Set();
  }

  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const midiName = m => NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);

  // Group events into simultaneous beats.
  // Uses gap-based grouping: each note must be < 40ms after the previous note,
  // with a max 80ms window from the first note to handle rolled/arpeggiated chords
  // without merging truly separate beats.
  // Duplicate midi pitches within a beat are collapsed to one.
  function buildBeats(events) {
    beats = [];
    let i = 0;
    while (i < events.length) {
      const t0 = events[i].time;
      let tPrev = t0;
      const group = [];
      const seen = new Set();
      while (i < events.length && events[i].time - tPrev < 0.04 && events[i].time - t0 < 0.08) {
        const e = events[i++];
        tPrev = e.time;
        if (!seen.has(e.midi)) { seen.add(e.midi); group.push(e); }
      }
      beats.push({ notes: group, time: t0 });
    }
  }

  function showBeat() {
    pianoKeyColors = {};
    if (beatIdx >= beats.length) {
      if (_loopEnabled && loopA >= 0) { jumpToLoop(); }
      else { finish(); return; }
    }
    pressedThisBeat = new Set();
    beatStartTime = performance.now();

    // Gold highlight for required notes
    for (const e of beats[beatIdx].notes) {
      const pk = pianoKeys.find(p => p.midi === e.midi);
      if (pk) pianoKeyColors[e.midi] = '#ffaa00';
    }
    drawPiano();

    midiGuideIdx = 0;
    if (!trailAnimId) trailAnimId = requestAnimationFrame(animateNoteTrail);

    const names = beats[beatIdx].notes.map(e => midiName(e.midi)).join(' + ');
    document.getElementById('follow-status').textContent = `${names}  (${beatIdx + 1} / ${beats.length})`;
  }

  function onNoteOn(midi, velocity) {
    if (!_active || beatIdx >= beats.length) return false;
    const beat = beats[beatIdx];
    const required = new Set(beat.notes.map(e => e.midi));

    // Wrong note — play it so user hears, but don't advance
    if (!required.has(midi)) {
      totalErrors++;
      playMidiNote(midi, 0.4, velocity);
      const pk = pianoKeys.find(p => p.midi === midi);
      if (pk) {
        pianoKeyColors[midi] = pk.isBlack ? '#440000' : '#cc2200';
        drawPiano();
        setTimeout(() => { delete pianoKeyColors[midi]; showBeat(); }, 300);
      }
      return true;
    }

    // Correct note — use long duration so physical key-release (releaseNote) controls the end
    playMidiNote(midi, 30, velocity);
    pressedThisBeat.add(midi);

    // Flash green
    const pk = pianoKeys.find(p => p.midi === midi);
    if (pk) pianoKeyColors[midi] = pk.isBlack ? '#004422' : '#00cc66';
    drawPiano();

    // All notes of this beat pressed → advance
    if ([...required].every(m => pressedThisBeat.has(m))) {
      beatTimings.push(performance.now() - beatStartTime);
      beatIdx++;
      if (_loopEnabled && loopA >= 0 && loopB >= 0 && beatIdx > loopB) jumpToLoop();
      setTimeout(() => { if (_active) showBeat(); }, 80);
    }
    return true;
  }

  function finish() {
    _active = false;
    pianoKeyColors = {};
    midiGuideEvents = null;
    drawPiano();
    document.getElementById('follow-status').textContent = 'Done!';
    document.getElementById('midi-follow').textContent = 'Follow';
    document.getElementById('midi-follow').disabled = false;

    // Save run stats
    const elapsed = (performance.now() - runStartTime) / 1000;
    const sel = document.getElementById('midi-select');
    const songName = sel.selectedOptions[0]?.textContent || sel.value || 'Unknown';
    const medianBeat = beatTimings.length
      ? beatTimings.slice().sort((a, b) => a - b)[Math.floor(beatTimings.length / 2)] : 0;
    const entry = {
      id: Date.now(),
      date: new Date().toISOString(),
      song: songName,
      durationSec: Math.round(elapsed),
      perfectSec: Math.round(perfectDuration),
      beats: beatTimings.length,
      errors: totalErrors,
      medianBeatMs: Math.round(medianBeat),
      excluded: false,
    };
    const log = loadFollowLog();
    log.push(entry);
    saveFollowLog(log);
    renderFollowLog();
  }

  function tick(nowMs) {
    if (!_active) return;
    const dt = (nowMs - lastWallTime) / 1000;
    lastWallTime = nowMs;
    if (dt > 0 && dt < 0.5) {  // ignore first frame and large gaps
      const cap = beatIdx < beats.length ? beats[beatIdx].time : Infinity;
      virtualTime = Math.min(virtualTime + dt, cap);
    }
  }

  function start(events) {
    if (!events.length) return;
    buildBeats(events);
    beatIdx = 0;
    pressedThisBeat = new Set();
    virtualTime = 0;
    lastWallTime = performance.now();
    loopA = -1; loopB = -1; _loopEnabled = false;
    _active = true;
    runStartTime = performance.now();
    beatStartTime = runStartTime;
    totalErrors = 0;
    beatTimings = [];
    perfectDuration = beats.length > 1 ? beats[beats.length - 1].time - beats[0].time : 0;
    midiGuideEvents = events;
    const learnEl = document.getElementById('learn-loop');
    if (learnEl) { learnEl.style.display = 'flex'; updateLearnUI(); }
    document.getElementById('loop-enable').checked = false;
    showBeat();
  }

  function stop() {
    _active = false;
    beats = [];
    pianoKeyColors = {};
    midiGuideEvents = null;
    midiGuideStart = 0;
    virtualTime = 0;
    loopA = -1; loopB = -1; _loopEnabled = false;
    stopNoteTrail();
    drawPiano();
    document.getElementById('follow-status').textContent = '';
    document.getElementById('midi-follow').textContent = 'Follow';
    const learnEl = document.getElementById('learn-loop');
    if (learnEl) learnEl.style.display = 'none';
  }

  function seekToBeat(idx) {
    if (!_active || !beats.length) return;
    beatIdx = Math.max(0, Math.min(idx, beats.length - 1));
    virtualTime = beats[beatIdx].time;
    lastWallTime = performance.now();
    pressedThisBeat = new Set();
    pianoKeyColors = {};
    drawPiano();
    showBeat();
  }

  function seekToTime(timeSec) {
    if (!_active || !beats.length) return;
    // Find the beat closest to this time
    let idx = 0;
    for (let i = 0; i < beats.length; i++) {
      if (beats[i].time <= timeSec) idx = i;
      else break;
    }
    seekToBeat(idx);
  }

  return { start, stop, onNoteOn, tick, loadFollowLog, saveFollowLog, seekToBeat, seekToTime,
    get active() { return _active; },
    get guideTime() { return virtualTime; },
    get totalDuration() { return perfectDuration; },
    get beatCount() { return beats.length; },
    get beatIndex() { return beatIdx; },
    get currentBeat() { return _active && beatIdx < beats.length ? beats[beatIdx] : null; },
    setLoopA() { if (_active) { loopA = beatIdx; updateLearnUI(); } },
    setLoopB() { if (_active) { loopB = beatIdx; updateLearnUI(); } },
    setLoopEnabled(v) { _loopEnabled = v; },
    clearLoop() { loopA = -1; loopB = -1; _loopEnabled = false; document.getElementById('loop-enable').checked = false; updateLearnUI(); },
  };
})();

// ── Follow Log UI ──
function renderFollowLog() {
  const log = MidiFollow.loadFollowLog();
  const wrap = document.getElementById('follow-log-wrap');
  const el = document.getElementById('follow-log');
  wrap.style.display = log.length ? '' : 'none';
  if (!log.length) { el.innerHTML = ''; return; }

  const fmtDur = s => s >= 60 ? `${Math.floor(s / 60)}m ${s % 60}s` : `${s}s`;
  const fmtDate = iso => {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  let html = '<table style="width:100%;border-collapse:collapse;font-size:11px;">';
  html += '<tr style="color:#666;border-bottom:1px solid #222;text-align:left;">'
    + '<th style="padding:3px 6px;">Date</th>'
    + '<th style="padding:3px 6px;">Song</th>'
    + '<th style="padding:3px 6px;">Time</th>'
    + '<th style="padding:3px 6px;">Perfect</th>'
    + '<th style="padding:3px 6px;">Diff</th>'
    + '<th style="padding:3px 6px;">Beats</th>'
    + '<th style="padding:3px 6px;">Errors</th>'
    + '<th style="padding:3px 6px;">Med. beat</th>'
    + '<th style="padding:3px 4px;"></th></tr>';

  for (let i = log.length - 1; i >= 0; i--) {
    const e = log[i];
    const dim = e.excluded ? 'opacity:0.35;' : '';
    const errColor = e.errors === 0 ? '#4a4' : e.errors <= 5 ? '#aa4' : '#a44';
    const perfect = e.perfectSec || 0;
    let diffStr = '–', diffColor = '#666';
    if (perfect > 0) {
      const pct = Math.round(((e.durationSec - perfect) / perfect) * 100);
      diffStr = pct === 0 ? '0%' : (pct > 0 ? `+${pct}%` : `${pct}%`);
      diffColor = pct <= 5 ? '#4a4' : pct <= 20 ? '#aa4' : '#a44';
    }
    html += `<tr style="${dim}border-bottom:1px solid #181820;">`
      + `<td style="padding:3px 6px;color:#777;">${fmtDate(e.date)}</td>`
      + `<td style="padding:3px 6px;color:#aaa;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.song}</td>`
      + `<td style="padding:3px 6px;color:#7ae;">${fmtDur(e.durationSec)}</td>`
      + `<td style="padding:3px 6px;color:#666;">${perfect ? fmtDur(perfect) : '–'}</td>`
      + `<td style="padding:3px 6px;color:${diffColor};">${diffStr}</td>`
      + `<td style="padding:3px 6px;color:#999;">${e.beats}</td>`
      + `<td style="padding:3px 6px;color:${errColor};">${e.errors}</td>`
      + `<td style="padding:3px 6px;color:#999;">${e.medianBeatMs}ms</td>`
      + `<td style="padding:3px 4px;">`
      + `<button data-log-id="${e.id}" data-action="${e.excluded ? 'include' : 'exclude'}" `
      + `style="background:none;border:none;color:#666;cursor:pointer;font-size:10px;padding:1px 4px;" `
      + `title="${e.excluded ? 'Include this run' : 'Exclude this run'}">${e.excluded ? '↩' : '✕'}</button></td>`
      + '</tr>';
  }
  html += '</table>';
  el.innerHTML = html;

  // Wire exclude/include buttons
  el.querySelectorAll('button[data-log-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.logId);
      const action = btn.dataset.action;
      const log = MidiFollow.loadFollowLog();
      const entry = log.find(e => e.id === id);
      if (entry) {
        entry.excluded = action === 'exclude';
        MidiFollow.saveFollowLog(log);
        renderFollowLog();
      }
    });
  });
}

    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error('not an array');
      const existing = MidiFollow.loadFollowLog();
      const existingIds = new Set(existing.map(e => e.id));
      const merged = [...existing, ...imported.filter(e => !existingIds.has(e.id))];
      merged.sort((a, b) => a.id - b.id);
      MidiFollow.saveFollowLog(merged);
      renderFollowLog();
    } catch (e) {
      alert('Invalid follow log file');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
});

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function showTimeline(totalSec) {
  midiTimelineWrap.style.display = totalSec > 0 ? 'flex' : 'none';
  midiTimeTotal.textContent = fmtTime(totalSec);
  midiTimeCurrent.textContent = '0:00';
  midiTimeline.value = 0;
}

function updateTimeline() {
  if (timelineDragging) return;
  if (MidiPlayer.playing) {
    const elapsed = MidiPlayer.getElapsed();
    const total = MidiPlayer.getTotalDuration();
    if (total > 0) {
      midiTimeline.value = Math.round((elapsed / total) * 1000);
      midiTimeCurrent.textContent = fmtTime(elapsed);
    }
  } else if (MidiFollow.active) {
    const total = MidiFollow.totalDuration;
    const current = MidiFollow.guideTime;
    if (total > 0) {
      midiTimeline.value = Math.round((current / total) * 1000);
      midiTimeCurrent.textContent = fmtTime(current);
    }
  }
}

  requestAnimationFrame(timelineLoop);
})();

// ── Hall Effect Keyboard (WebHID) ──
const HEKeyboard = {
  device: null,
  keyStates: {},

  // Thresholds in raw units (0-240 = 0-4.0mm, 1 raw ≈ 0.017mm)
  NOISE_FLOOR: 30,       // below this = sensor noise, key is at rest
  STRIKE_POINT: 210,     // 3.5mm — note triggers here
  RELEASE_POINT: 20,     // ~0.33mm — below this = damper engages, note off
  RESET_POINT: 150,      // 2.5mm — below this after pressed = can re-trigger (trills)

  CODE_TO_MIDI: FULL_PIANO_CODE_MAP,

  MATRIX_TO_CODE: {
    '0_0':'Escape','0_1':'F1','0_2':'F2','0_3':'F3','0_4':'F4','0_5':'F5',
    '0_6':'F6','0_7':'F7','0_8':'F8','0_9':'F9','0_10':'F10','0_11':'F11',
    '0_12':'F12','0_13':'PrintScreen','0_14':'Delete',
    '1_0':'Backquote','1_1':'Digit1','1_2':'Digit2','1_3':'Digit3','1_4':'Digit4',
    '1_5':'Digit5','1_6':'Digit6','1_7':'Digit7','1_8':'Digit8','1_9':'Digit9',
    '1_10':'Digit0','1_11':'Minus','1_12':'Equal','1_13':'Backspace','1_14':'PageUp',
    '2_0':'Tab','2_1':'KeyQ','2_2':'KeyW','2_3':'KeyE','2_4':'KeyR','2_5':'KeyT',
    '2_6':'KeyY','2_7':'KeyU','2_8':'KeyI','2_9':'KeyO','2_10':'KeyP',
    '2_11':'BracketLeft','2_12':'BracketRight','2_13':'Backslash','2_14':'PageDown',
    '3_0':'CapsLock','3_1':'KeyA','3_2':'KeyS','3_3':'KeyD','3_4':'KeyF','3_5':'KeyG',
    '3_6':'KeyH','3_7':'KeyJ','3_8':'KeyK','3_9':'KeyL','3_10':'Semicolon',
    '3_11':'Quote','3_12':'Enter','3_13':'Home',
    '4_0':'ShiftLeft','4_2':'KeyZ','4_3':'KeyX','4_4':'KeyC','4_5':'KeyV','4_6':'KeyB',
    '4_7':'KeyN','4_8':'KeyM','4_9':'Comma','4_10':'Period','4_11':'Slash',
    '4_12':'ShiftRight','4_13':'ArrowUp','4_14':'End',
    '5_0':'ControlLeft','5_1':'MetaLeft','5_2':'AltLeft','5_6':'Space',
    '5_9':'AltRight','5_10':'ContextMenu','5_11':'ControlRight',
    '5_12':'ArrowLeft','5_13':'ArrowDown','5_14':'ArrowRight',
  },

  // Quadratic fit slope on trajectory samples → instantaneous velocity at the strike point.
  // Fits p = a·t² + b·t + c and evaluates dp/dt at t_last, so fast-then-slow presses yield
  // a low velocity and slow-then-fast (accelerating) presses yield a high velocity.
  trajectorySlope(samples) {
    const n = samples.length;
    // Fewer samples = faster press (key crossed the full travel in fewer packets).
    // 1 sample means the key went from noise floor to strike in a single HID frame (~1ms at 918Hz).
    if (n === 0) return 0;
    if (n === 1) return samples[0][1] / 0.001;  // travel / 1 packet ≈ max speed
    // Remove consecutive duplicate travel values — they carry no slope information
    const deduped = samples.filter((s, i) => i === n - 1 || s[1] !== samples[i + 1][1]);
    // Remove points within 0.5ms of the previous point — same-frame double-readings inflate slope
    const thinned = deduped.filter((s, i) => i === 0 || (s[0] - deduped[i - 1][0]) >= 0.0005);
    // Use last 30 samples (~33ms at 918Hz) for the fit window
    const pts = thinned.length <= 30 ? thinned : thinned.slice(thinned.length - 30);
    const m = pts.length;
    // After filtering, too few unique points — fall back to raw first→last slope
    if (m < 2) {
      const dt = samples[samples.length - 1][0] - samples[0][0];
      if (dt < 1e-6) return samples[samples.length - 1][1] / 0.001;  // near-instant → max speed
      return (samples[samples.length - 1][1] - samples[0][1]) / dt;
    }

    if (m < 3) {
      // Linear regression fallback when too few points for a quadratic
      let sumT = 0, sumP = 0, sumTP = 0, sumTT = 0;
      for (const [t, p] of pts) { sumT += t; sumP += p; sumTP += t * p; sumTT += t * t; }
      const denom = m * sumTT - sumT * sumT;
      if (Math.abs(denom) < 1e-15) return 0;
      return (m * sumTP - sumT * sumP) / denom;
    }

    // Normalize time to [0, 1] over the window for numerical stability
    const tFirst = pts[0][0], tLast = pts[pts.length - 1][0];
    const tSpan = tLast - tFirst;
    if (tSpan < 1e-9) return 0;
    const norm = pts.map(([t, p]) => [(t - tFirst) / tSpan, p]);

    // Accumulate sums for the 3×3 normal equations
    let S0 = 0, S1 = 0, S2 = 0, S3 = 0, S4 = 0, Y0 = 0, Y1 = 0, Y2 = 0;
    for (const [t, p] of norm) {
      const t2 = t * t;
      S0 += 1; S1 += t; S2 += t2; S3 += t2 * t; S4 += t2 * t2;
      Y0 += p; Y1 += t * p; Y2 += t2 * p;
    }

    // Normal equations: [S4,S3,S2; S3,S2,S1; S2,S1,S0]·[a,b,c]ᵀ = [Y2,Y1,Y0]ᵀ
    // Solve via Gaussian elimination with partial pivoting
    const A = [
      [S4, S3, S2, Y2],
      [S3, S2, S1, Y1],
      [S2, S1, S0, Y0],
    ];
    for (let col = 0; col < 3; col++) {
      let maxRow = col;
      for (let row = col + 1; row < 3; row++)
        if (Math.abs(A[row][col]) > Math.abs(A[maxRow][col])) maxRow = row;
      [A[col], A[maxRow]] = [A[maxRow], A[col]];
      if (Math.abs(A[col][col]) < 1e-12) continue;
      for (let row = col + 1; row < 3; row++) {
        const f = A[row][col] / A[col][col];
        for (let j = col; j <= 3; j++) A[row][j] -= f * A[col][j];
      }
    }
    const x = [0, 0, 0];
    for (let row = 2; row >= 0; row--) {
      if (Math.abs(A[row][row]) < 1e-12) continue;
      x[row] = A[row][3];
      for (let j = row + 1; j < 3; j++) x[row] -= A[row][j] * x[j];
      x[row] /= A[row][row];
    }
    // x = [a, b, c]; velocity at normalized t=1 (the strike moment) = 2a + b
    // Convert back from normalized time by dividing by tSpan
    return (2 * x[0] + x[1]) / tSpan;  // raw_units / sec
  },

  // Map travel speed (raw/sec) to velocity 0.0–1.0
  // Calibrated for 3.5mm strike point at 918Hz with quadratic instantaneous-speed fit.
  // Log scale 30–50000 raw/s normalised to [0,1], then raised to power 1.3.
  // Exponent derived from three anchors: feather(30)→vel 1, gentle(300)→vel 28, smash(50000)→vel 127.
  //   Feather:       ~30 raw/s                       → vel ~1
  //   Gentle press:  ~300 raw/s  (~700ms to bottom)  → vel ~28
  //   Soft press:    ~1000 raw/s (~200ms to bottom)  → vel ~48
  //   Medium press:  ~5000 raw/s (~80ms to bottom)   → vel ~78
  //   Hard press:    ~20000 raw/s (~20ms to bottom)  → vel ~107
  //   Smash:         ~50000 raw/s (~8ms to bottom)   → vel 127
  speedToVelocity(speed) {
    speed = Math.abs(speed);
    if (speed < 1) return 1 / 127;
    // Log mapping 30–50000, then v^1.3 (anchored so 300 raw/s → vel 28)
    const v = (Math.log(speed) - Math.log(30)) / (Math.log(50000) - Math.log(30));
    return Math.max(1 / 127, Math.min(1.0, Math.pow(Math.max(0, v), 1.3)));
  },

  // Map release speed (raw/sec, positive = rising) to decay time in seconds.
  // Fast release (staccato) → short decay; slow release (legato) → long decay.
  //   Snap release:  ~3000+ raw/s → 0.05s
  //   Quick:         ~1000 raw/s  → 0.15s
  //   Normal:        ~300 raw/s   → 0.5s
  //   Slow:          ~50 raw/s    → 1.2s
  releaseSpeedToDecay(speed) {
    speed = Math.abs(speed);
    if (speed < 10) return 1.5;
    // Log mapping: 50–4000 raw/s → 1.2s–0.12s (inverted: faster = shorter)
    const t = (Math.log(speed) - Math.log(50)) / (Math.log(4000) - Math.log(50));
    return Math.max(0.12, 1.2 * (1 - Math.min(1, t)));
  },

  getState(key) {
    if (!this.keyStates[key]) {
      // state: 'idle' | 'descending' | 'pressed'
      // returning: true when key is rising after a press — suppress travel viz
      this.keyStates[key] = { state: 'idle', travel: 0, trajectory: [], returning: false, strikeTime: 0, stateTime: 0 };
    }
    return this.keyStates[key];
  },

  processReport(data) {
    if (data[0] !== 0xa9 || data[1] !== 0x31) return;
    if (!samplesReady) return;
    const now = performance.now() / 1000;
    const nkeys = data[2];
    const activeThisFrame = new Set();
    let needRedraw = false;

    for (let i = 0; i < nkeys; i++) {
      const posByte = data[3 + i * 2];
      const travelRaw = data[3 + i * 2 + 1];
      const row = (posByte >> 4) & 0xF;
      const col = posByte & 0xF;
      const key = `${row}_${col}`;
      activeThisFrame.add(key);

      const code = this.MATRIX_TO_CODE[key];
      if (!code) continue;
      const midi = this.CODE_TO_MIDI[code];
      if (midi === undefined) continue;

      const st = this.getState(key);
      const prev = st.travel;
      st.travel = travelRaw;

      // Live travel visualization (suppressed on return journey, and don't overwrite follow-mode highlights)
      // Also suppress for any pressed key in follow mode — prevents teal re-paint on held keys after beat advances
      const followProtected = MidiFollow.active &&
        (pianoKeyColors[midi] === '#ffaa00' || st.state === 'pressed');
      if (travelRaw > this.NOISE_FLOOR && !st.returning && !followProtected) {
        const frac = Math.min(1, travelRaw / 240);
        const pk = pianoKeys.find(p => p.midi === midi);
        if (pk) {
          const g = Math.round(100 + 155 * frac);
          pianoKeyColors[midi] = pk.isBlack
            ? `rgb(0,${Math.round(g * 0.4)},${Math.round(g * 0.4)})`
            : `rgb(0,${g},${g})`;
          needRedraw = true;
        }
      }

      // ── Theremin mode: travel depth → amplitude, no strike threshold ──
      if (state.instrument === 'theremin') {
        // Schmitt-trigger hysteresis: higher bar to START a voice than to KEEP it,
        // preventing chatter pops when the sensor oscillates near the noise floor.
        const voiceActive = !!thereminVoices[midi];
        const onThresh  = this.NOISE_FLOOR + 13;  // ~0.47mm — must exceed to open voice
        const offThresh = this.NOISE_FLOOR - 5;   // ~0.17mm — must drop below to close it
        if (travelRaw > (voiceActive ? offThresh : onThresh)) {
          thereminUpdate(midi, travelRaw);
          // Notify MidiFollow when key crosses STRIKE_POINT (once per press)
          if (MidiFollow.active && travelRaw >= this.STRIKE_POINT && !thereminFiredKeys.has(key)) {
            thereminFiredKeys.add(key);
            const vel = Math.round(64 + (travelRaw / 240) * 63);  // 64–127 based on depth at crossing
            MidiFollow.onNoteOn(midi, vel);
          }
          // Allow re-trigger once key rises back above RESET_POINT
          if (travelRaw < this.RESET_POINT) thereminFiredKeys.delete(key);
        } else {
          if (voiceActive) {
            thereminStop(midi);
            thereminFiredKeys.delete(key);
            if (MidiFollow.active) releaseNote(midi);
          }
          fadeOutKey(midi);
          needRedraw = true;
        }
        drawThereminDisplay();
        continue;
      }

      // ── State machine ──

      if (st.state === 'idle') {
        if (travelRaw > this.NOISE_FLOOR) {
          st.state = 'descending';
          st.stateTime = now;
          st.trajectory = [[now, travelRaw]];
        }
      }

      else if (st.state === 'descending') {
        st.trajectory.push([now, travelRaw]);
        if (st.trajectory.length > 200) st.trajectory.shift();  // cap memory

        // Stall timeout: if stuck in descending >1500ms without hitting STRIKE_POINT, reset
        if (now - st.stateTime > 1.5) {
          st.state = 'idle';
          st.returning = false;
          st.trajectory = [];
          fadeOutKey(midi);
          needRedraw = true;
          continue;
        }

        if (travelRaw <= this.NOISE_FLOOR) {
          // Key fully returned without triggering note — fade out and go idle
          st.state = 'idle';
          st.returning = false;
          st.trajectory = [];
          fadeOutKey(midi);
          needRedraw = true;
        }
        else if (travelRaw >= this.STRIKE_POINT) {
          // ── NOTE ON ──
          st.state = 'pressed';
          st.returning = false;
          st.strikeTime = now;
          const speed = this.trajectorySlope(st.trajectory);
          const vel01 = this.speedToVelocity(speed);
          const t0 = st.trajectory[0][0];
          const velocity127 = Math.round(vel01 * 127);
          const velocity = velocity127;
          recentStrikes.push({ trajectory: [...st.trajectory], hue: (midi * 137.5) % 360, velocity: velocity127 });
          if (recentStrikes.length > 5) recentStrikes.shift();
          drawPressCurve();
          const uniqueSamples = st.trajectory.filter((s, i) => i === st.trajectory.length - 1 || s[1] !== st.trajectory[i + 1][1]).length;
          if (velocity < 30) console.log('pp strike ' + JSON.stringify({ midi, velocity, speed: Math.round(speed), durationMs: Math.round((now - t0) * 1000), samples: st.trajectory.length, uniqueSamples, trajectory: st.trajectory.map(([t, v]) => [Math.round((t - t0) * 1000), v]) }));

          if (!fullPianoMode) setFullPianoMode(true);
          keysHeld[code] = true;
          // Find mode: C4 continues to next trial after answer
          if (findWaitingToContinue && midi === 60) {
            findWaitingToContinue = false;
            startTrial();
          }
          if (!MidiFollow.active) playMidiNote(midi, 30, velocity);
          else MidiFollow.onNoteOn(midi, velocity);
          if (state.currentMode === 'play') {
            let info = midiToStaffNote(midi, state.currentClef);
            let clef = state.currentClef;
            if (!info) { info = midiToStaffNote(midi, clef === 'treble' ? 'bass' : 'treble'); clef = clef === 'treble' ? 'bass' : 'treble'; }
            if (info && !playModeNotes.some(pn => pn.midi === midi)) {
              playModeNotes.push({ note: info.note, clef, accidental: info.accidental, label: info.displayName, midi });
              addToNoteTrail(midi, clef, info.note, info.accidental, info.displayName);
            }
            showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
          }
        }
      }

      else if (st.state === 'pressed') {
        modulatePressure(midi, travelRaw);

        // Track rising trajectory for release-speed detection
        const lastRelease = st.releaseTraj?.at(-1);
        if (!lastRelease || travelRaw !== lastRelease[1]) {
          if (!st.releaseTraj) st.releaseTraj = [];
          st.releaseTraj.push([now, travelRaw]);
          if (st.releaseTraj.length > 20) st.releaseTraj.shift();
        }

        if (travelRaw <= this.RELEASE_POINT) {
          // ── NOTE OFF ──
          const releaseSpeed = this.trajectorySlope(st.releaseTraj || []);
          const decay = this.releaseSpeedToDecay(releaseSpeed);
          this.noteOff(key, code, midi, decay);
          st.state = 'idle';
          st.trajectory = [];
          st.releaseTraj = null;
          needRedraw = true;
        }
        else if (travelRaw <= this.RESET_POINT) {
          // Key came up past reset point — release note and ready to re-trigger (trills)
          const releaseSpeed = this.trajectorySlope(st.releaseTraj || []);
          const decay = this.releaseSpeedToDecay(releaseSpeed);
          this.noteOff(key, code, midi, decay);
          st.state = 'descending';
          st.stateTime = now;
          st.returning = true;
          st.trajectory = [[now, travelRaw]];
          st.releaseTraj = null;
          needRedraw = true;
        }
      }
    }

    // Keys that disappeared from stream entirely (travel = 0)
    for (const [key, st] of Object.entries(this.keyStates)) {
      if (activeThisFrame.has(key)) continue;
      if (st.state === 'idle' && st.travel <= this.NOISE_FLOOR) continue;

      const code = this.MATRIX_TO_CODE[key];
      const midi = code ? this.CODE_TO_MIDI[code] : undefined;

      if (midi !== undefined && state.instrument === 'theremin') {
        thereminStop(midi);
        thereminFiredKeys.delete(key);
        if (MidiFollow.active) releaseNote(midi);
        drawThereminDisplay();
      } else if (st.state !== 'idle' && midi !== undefined) {
        this.noteOff(key, code, midi);
      }
      st.state = 'idle';
      st.travel = 0;
      st.trajectory = [];
      if (midi !== undefined) { fadeOutKey(midi); needRedraw = true; }
    }
    if (needRedraw) { drawPiano(); drawPressDots(); }
  },

  noteOff(key, code, midi, decay = 0.4) {
    delete keysHeld[code];
    releaseNote(midi, decay);
    fadeOutKey(midi);
    if (state.currentMode === 'play') {
      playModeNotes = playModeNotes.filter(pn => pn.midi !== midi);
      releaseFromNoteTrail(midi);
      showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
    }
  },

  async connect(existingDevice) {
    if (!navigator.hid) {
      alert('WebHID not supported in this browser. Use Chrome or Edge.');
      return;
    }
    const statusEl = document.getElementById('he-status');
    statusEl.style.display = '';
    statusEl.textContent = existingDevice ? 'Auto-connecting...' : 'Requesting device...';

    try {
      if (existingDevice) {
        this.device = existingDevice;
      } else {
        const devices = await navigator.hid.requestDevice({
          filters: [{ vendorId: 0x3434, usagePage: 0xFF60, usage: 0x61 }]
        });
        if (!devices.length) { statusEl.textContent = 'No device selected'; return; }
        this.device = devices[0];
      }
      if (!this.device.opened) await this.device.open();

      statusEl.textContent = 'Enabling stream...';

      // Enable streaming (a9 31 01)
      const enableCmd = new Uint8Array(32);
      enableCmd[0] = 0xa9;
      enableCmd[1] = 0x31;
      enableCmd[2] = 0x01;
      await this.device.sendReport(0, enableCmd);

      // Listen for reports
      this.device.addEventListener('inputreport', (e) => {
        const data = new Uint8Array(e.data.buffer);
        this.processReport(data);
      });

      statusEl.textContent = 'Connected — streaming';
      statusEl.style.color = '#0a0';
      document.getElementById('he-connect-btn').textContent = 'HE Connected';
      document.getElementById('he-connect-btn').disabled = true;
      document.getElementById('pressure-expr-label').style.display = '';
      document.getElementById('press-dot-canvas').style.display = 'block';
      document.getElementById('press-dot-resize').style.display = 'block';
      document.getElementById('press-curve-canvas').style.display = 'block';

      // Auto-enable full piano mode
      if (!fullPianoMode) setFullPianoMode(true);
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.style.color = '#a00';
      console.error('HE keyboard connect error:', err);
    }
  }
};

// Drag-to-resize for the dot panel
(function () {
  const grip = document.getElementById('press-dot-resize');
  const canvas = document.getElementById('press-dot-canvas');
  let dragging = false, startY = 0, startH = 0;
  grip.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    startH = canvas.height;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newH = Math.max(32, startH + (e.clientY - startY));
    canvas.height = newH;
  });
  document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Web MIDI Input — physical keyboard support ──────────────────────────────
const MidiInput = (() => {
  let sustainPedal = false;
  const sustainedNotes = new Set();

  let flashTimer = null;
  function flashNote(midi) {
    const el = document.getElementById('midi-in-status');
    if (!el) return;
    const names = el.dataset.names || '';
    const noteName = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][midi % 12] + Math.floor(midi / 12 - 1);
    el.textContent = '🎹 ' + (names ? names + ' · ' : '') + noteName;
    el.style.color = '#88ddaa';
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => {
      el.textContent = '🎹 ' + (names || 'connected');
      el.style.color = '#44aa66';
    }, 400);
  }

  function noteOn(midi, velocity) {
    if (!samplesReady) return;
    flashNote(midi);
    if (!fullPianoMode) setFullPianoMode(true);
    if (MidiFollow.active) {
      MidiFollow.onNoteOn(midi, velocity);
      drawPiano();
      return;
    }
    // Find mode: C4 (midi 60) continues to next trial after answer
    if (findWaitingToContinue && midi === 60) {
      findWaitingToContinue = false;
      startTrial();
      return;
    }
    playMidiNote(midi, 30, velocity);
    const pk = pianoKeys.find(p => p.midi === midi);
    if (pk) pianoKeyColors[midi] = pk.isBlack ? '#006666' : '#00aaaa';
    // Find mode: answer with MIDI key press
    if (state.currentMode === 'find' && awaitingAnswer) {
      handleAnswer(midiToNoteName(midi), midi);
      drawPiano();
      return;
    }
    if (state.currentMode === 'play') {
      const preferClef = state.currentClef;
      const otherClef = preferClef === 'treble' ? 'bass' : 'treble';
      let info = midiToStaffNote(midi, preferClef);
      let noteClef = info ? preferClef : null;
      if (!info) { info = midiToStaffNote(midi, otherClef); noteClef = info ? otherClef : null; }
      if (info && !playModeNotes.some(pn => pn.midi === midi)) {
        playModeNotes.push({ note: info.note, clef: noteClef, accidental: info.accidental, label: info.displayName, midi });
        addToNoteTrail(midi, noteClef, info.note, info.accidental, info.displayName);
      }
      showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
    }
    drawPiano();
  }

  function noteOff(midi) {
    releaseNote(midi);
    if (MidiFollow.active) {
      // Don't fade out keys that are highlighted for the current beat
      const cur = MidiFollow.currentBeat;
      if (!cur || !cur.notes.some(e => e.midi === midi)) {
        fadeOutKey(midi);
      }
      drawPiano();
      return;
    }
    fadeOutKey(midi);
    if (state.currentMode === 'play') {
      playModeNotes = playModeNotes.filter(pn => pn.midi !== midi);
      releaseFromNoteTrail(midi);
      showResult(playModeNotes.map(pn => pn.label || pn.note.id).join(' + '), '');
    }
    drawPiano();
  }

  function onMessage(e) {
    const [status, note, velocity] = e.data;
    const cmd = status & 0xF0;
    if ((status & 0x0F) === 9) return;  // ignore drum channel

    if (cmd === 0x90 && velocity > 0) {
      noteOn(note, velocity);
    } else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) {
      if (sustainPedal) {
        sustainedNotes.add(note);
      } else {
        noteOff(note);
      }
    } else if (cmd === 0xB0) {
      if (note === 64) {  // sustain pedal
        sustainPedal = velocity >= 64;
        if (!sustainPedal) {
          for (const n of sustainedNotes) noteOff(n);
          sustainedNotes.clear();
        }
      }
    }
  }

  function updateStatus(access) {
    const el = document.getElementById('midi-in-status');
    if (!el) return;
    const names = [...access.inputs.values()].map(i => i.name).filter(Boolean);
    if (names.length) {
      const label = names.join(', ');
      el.dataset.names = label;
      el.textContent = '🎹 ' + label;
      el.style.color = '#44aa66';
      document.getElementById('full-kb-label').style.display = '';
      if (!fullPianoMode) setFullPianoMode(true);
    } else {
      el.dataset.names = '';
      el.textContent = 'No MIDI input';
      el.style.color = '#666';
    }
  }

  async function init() {
    const el = document.getElementById('midi-in-status');
    if (!navigator.requestMIDIAccess) {
      if (el) { el.textContent = 'Web MIDI not supported'; el.style.color = '#a66'; }
      return;
    }
    try {
      const access = await navigator.requestMIDIAccess({ sysex: false });
      const connect = input => { input.onmidimessage = onMessage; };
      const rescan = () => {
        for (const input of access.inputs.values()) connect(input);
        updateStatus(access);
      };
      rescan();
      access.onstatechange = ev => {
        if (ev.port.type !== 'input') return;
        if (ev.port.state === 'connected') connect(ev.port);
        updateStatus(access);
      };
      const btn = document.getElementById('midi-rescan-btn');
      if (btn) { btn.style.display = ''; btn.onclick = rescan; }
    } catch (err) {
      if (el) { el.textContent = 'MIDI denied'; el.style.color = '#a66'; }
    }
  }

  // BLE-MIDI packet parser.
  // Format: [Header: 10xxxxxx] ([Timestamp: 1xxxxxxx] [Status] [Data…])…
  function parseBLEPacket(bytes) {
    const out = [];
    let i = 1; // skip header byte
    while (i < bytes.length) {
      if (bytes[i] & 0x80) i++; // skip timestamp byte
      if (i >= bytes.length) break;
      const status = bytes[i++];
      if (!(status & 0x80)) continue; // guard: must be a status byte
      const cmd = status & 0xF0;
      if ((cmd === 0x80 || cmd === 0x90 || cmd === 0xA0 || cmd === 0xB0 || cmd === 0xE0) && i + 1 < bytes.length) {
        out.push([status, bytes[i], bytes[i + 1]]); i += 2;
      } else if ((cmd === 0xC0 || cmd === 0xD0) && i < bytes.length) {
        out.push([status, bytes[i], 0]); i++;
      }
    }
    return out;
  }

  async function connectBLE() {
    const BLE_SERVICE = '03b80e5a-ede8-4b33-a751-6ce34ec4c700';
    const BLE_CHAR    = '7772e5db-3868-4112-a1a9-f2669d106bf3';
    const btn = document.getElementById('ble-midi-btn');
    if (!navigator.bluetooth) {
      btn.textContent = '🔵 BLE N/A'; btn.style.color = '#a66'; return;
    }
    try {
      btn.textContent = '🔵 …'; btn.style.color = '#aaa';
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [BLE_SERVICE],
      });
      device.addEventListener('gattserverdisconnected', () => {
        btn.textContent = '🔵 BLE'; btn.style.color = '#888';
      });
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(BLE_SERVICE);
      const char = await service.getCharacteristic(BLE_CHAR);
      char.addEventListener('characteristicvaluechanged', ev => {
        for (const msg of parseBLEPacket(new Uint8Array(ev.target.value.buffer)))
          onMessage({ data: msg });
      });
      await char.startNotifications();
      btn.textContent = '🔵 ' + (device.name || 'BLE'); btn.style.color = '#44aa66';
    } catch (err) {
      if (err.name !== 'NotFoundError') {
        btn.textContent = '🔵 err'; btn.style.color = '#a66';
        console.error('BLE MIDI:', err);
      } else {
        btn.textContent = '🔵 BLE'; btn.style.color = '#888';
      }
    }
  }

  return { init, connectBLE };
})();

document.getElementById('ble-midi-btn').addEventListener('click', () => MidiInput.connectBLE());

// Show HE button and auto-connect to previously paired device
if (navigator.hid) {
  document.getElementById('he-connect-btn').style.display = '';
  navigator.hid.getDevices().then(devices => {
    const ke = devices.find(d => d.vendorId === 0x3434 &&
      d.collections?.some(c => c.usagePage === 0xFF60));
    if (ke) HEKeyboard.connect(ke);
  });
}
